<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storm43 — Design Approval Portal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#5AB544;--brand-dark:#3d8a2e;--brand-light:#eaf5e6;--brand-mid:#c8e8c0;
  --dark:#0e0e0d;--dark2:#171715;--dark3:#242421;
  --bg:#f4f3ef;--surface:#fff;--border:#e0dfd9;--border2:#ececea;
  --text:#18180f;--muted:#6b6b60;--subtle:#a8a89a;
  --amber:#c47d10;--amber-bg:#fdf0d6;--amber-border:#f0c96a;
  --red:#991f1f;--red-bg:#fdf0f0;--red-border:#f5b8b8;
  --blue:#1456a0;--blue-bg:#e8f0fc;
  --font:'Syne',sans-serif;--mono:'DM Mono',monospace;
  --r:8px;--rl:12px;--rxl:18px;
}
body{font-family:var(--font);background:#1a1a18;color:var(--text);font-size:14px;min-height:100vh;-webkit-font-smoothing:antialiased}

/* LOADING */
#loading-screen{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:9999}
.load-bar{width:220px;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.load-fill{height:100%;background:var(--brand);animation:la 1.6s ease-in-out infinite}
@keyframes la{0%{width:0;margin-left:0}50%{width:55%;margin-left:0}100%{width:0;margin-left:100%}}
.load-text{font-size:11px;color:rgba(255,255,255,0.3);font-family:var(--mono);letter-spacing:1px}

/* HEADER */
.hdr{background:var(--dark);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;height:50px}
.hdr img{height:28px}
.hdr-mid{display:flex;flex-direction:column;align-items:center}
.hdr-ref{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--brand);letter-spacing:1px}
.hdr-title{font-size:11px;color:rgba(255,255,255,0.45);max-width:300px;text-overflow:ellipsis;overflow:hidden;white-space:nowrap}
.hdr-right{display:flex;align-items:center;gap:10px}
.pill{padding:4px 12px;border-radius:20px;font-size:10px;font-weight:700;font-family:var(--mono);letter-spacing:0.5px;white-space:nowrap}
.pill-pending{background:#fdf0d6;color:#c47d10;border:1px solid #f0c96a}
.pill-approved{background:var(--brand-light);color:var(--brand-dark);border:1px solid var(--brand-mid)}
.pill-rejected{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.pill-revision{background:var(--blue-bg);color:var(--blue);border:1px solid #9ec0f0}

/* APP */
#app{display:none;flex-direction:column;height:100vh}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden}

/* VIEWER */
.viewer{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#2a2a27}

/* TOOLBAR */
.toolbar{background:#111;padding:7px 14px;display:flex;align-items:center;gap:5px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.06);flex-wrap:wrap}
.tb{width:32px;height:32px;border-radius:6px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.55);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.15s;flex-shrink:0}
.tb:hover{background:rgba(255,255,255,0.1);color:#fff;border-color:rgba(255,255,255,0.18)}
.tb.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.tb-sep{width:1px;height:20px;background:rgba(255,255,255,0.07);margin:0 2px;flex-shrink:0}
.tb-lbl{font-size:9px;color:rgba(255,255,255,0.22);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;flex-shrink:0}
.tb-colour{width:28px;height:28px;border-radius:5px;border:2px solid rgba(255,255,255,0.12);cursor:pointer;padding:0;background:none;flex-shrink:0}
.tb-range{width:70px;accent-color:var(--brand);cursor:pointer;flex-shrink:0}
.tb-hint{font-size:10px;color:rgba(255,255,255,0.22);font-family:var(--mono);margin-left:auto}
.page-nav{display:flex;align-items:center;gap:6px;margin-left:8px}
.page-nav button{padding:4px 8px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:rgba(255,255,255,0.6);cursor:pointer;font-size:12px;font-family:var(--mono)}
.page-nav button:hover{background:rgba(255,255,255,0.12);color:#fff}
.page-lbl{font-size:11px;color:rgba(255,255,255,0.4);font-family:var(--mono);white-space:nowrap}

/* CANVAS SCROLL */
.canvas-scroll{flex:1;overflow:auto;display:flex;flex-direction:column;align-items:center;padding:20px;gap:16px;cursor:default}
.canvas-scroll.cur-cross{cursor:crosshair}
.canvas-scroll.cur-cell{cursor:cell}
.canvas-scroll.cur-text{cursor:text}

/* PAGE WRAP */
.page-wrap{position:relative;flex-shrink:0;background:#fff;box-shadow:0 4px 24px rgba(0,0,0,0.4);border-radius:3px}
.page-wrap canvas.pdf-layer{display:block;border-radius:3px}
.page-wrap canvas.ann-layer{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:3px;pointer-events:none}
.page-wrap canvas.ann-layer.active{pointer-events:all}
.pins-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}

/* NO FILE */
.no-file{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:14px;color:rgba(255,255,255,0.25);text-align:center;padding:40px}
.no-file-icon{font-size:56px;opacity:0.3}

/* PIN */
.pin{position:absolute;width:24px;height:24px;border-radius:50% 50% 50% 2px;transform:rotate(-45deg);transform-origin:bottom left;cursor:pointer;display:flex;align-items:center;justify-content:center;pointer-events:all;transition:transform 0.15s;box-shadow:0 2px 8px rgba(0,0,0,0.5);border:2px solid rgba(255,255,255,0.25);z-index:20}
.pin:hover,.pin.sel{transform:rotate(-45deg) scale(1.18);box-shadow:0 0 0 3px rgba(255,255,255,0.3),0 2px 10px rgba(0,0,0,0.5)}
.pin-n{transform:rotate(45deg);font-size:9px;font-weight:800;color:#fff;font-family:var(--mono);line-height:1}
.pin-comment{background:#5AB544}.pin-change{background:#c47d10}.pin-error{background:#991f1f}.pin-ok{background:#1456a0}

/* PIN POP */
.pin-pop{position:absolute;z-index:200;background:var(--surface);border:1.5px solid var(--brand);border-radius:12px;padding:14px;min-width:240px;max-width:290px;box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.pin-pop-title{font-size:11px;font-weight:700;color:var(--brand-dark);font-family:var(--mono);margin-bottom:8px}
.pin-pop textarea{width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--font);resize:none;min-height:80px;outline:none;margin-bottom:8px;display:block;background:var(--bg)}
.pin-pop textarea:focus{border-color:var(--brand);background:var(--surface)}
.pin-pop select{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--font);margin-bottom:10px;outline:none;background:var(--surface)}
.pp-btns{display:flex;gap:6px}
.pp-save{flex:1;padding:8px;background:var(--brand);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;font-family:var(--font)}
.pp-cancel{padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:12px;font-family:var(--font)}

/* SIDEBAR */
.sidebar{width:330px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:13px 15px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-title{font-size:13px;font-weight:700;margin-bottom:2px}
.sb-sub{font-size:10px;color:var(--muted);font-family:var(--mono)}
.sb-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.sbt{flex:1;padding:9px;text-align:center;font-size:10px;font-weight:700;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all 0.15s;font-family:var(--mono);letter-spacing:0.5px;text-transform:uppercase}
.sbt.on{color:var(--brand-dark);border-bottom-color:var(--brand);background:var(--brand-light)}
.sb-body{flex:1;overflow-y:auto;padding:12px}

/* ANNOTATIONS */
.ann-tip{font-size:11px;color:var(--muted);padding:8px 10px;background:var(--bg);border-radius:6px;margin-bottom:10px;line-height:1.5;border-left:3px solid var(--brand-mid)}
.ann-empty{text-align:center;padding:28px 12px;color:var(--subtle);font-size:12px}
.ann-item{border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:7px;cursor:pointer;transition:all 0.15s}
.ann-item:hover{border-color:var(--brand-mid);background:#f8fdf5}
.ann-item.sel{border-color:var(--brand);background:var(--brand-light)}
.ann-item.tc,.ann-item.te{border-color:var(--red-border);background:var(--red-bg)}
.ann-head{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.ann-dot{width:20px;height:20px;border-radius:50%;color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;font-family:var(--mono);flex-shrink:0}
.ann-type{font-size:10px;font-family:var(--mono);color:var(--muted)}
.ann-pg{font-size:9px;font-family:var(--mono);color:var(--subtle);margin-left:2px}
.ann-time{font-size:9px;color:var(--subtle);margin-left:auto;font-family:var(--mono)}
.ann-text{font-size:12px;line-height:1.45;margin-bottom:3px}
.ann-who{font-size:10px;color:var(--muted);font-family:var(--mono)}
.ann-rply-btn{font-size:11px;color:var(--blue);cursor:pointer;margin-top:5px;display:inline-block}
.ann-replies{margin-top:7px;padding-top:7px;border-top:1px solid var(--border2)}
.rply{font-size:11px;padding:5px 8px;background:var(--bg);border-radius:4px;margin-bottom:3px;line-height:1.4}
.rply-who{font-family:var(--mono);color:var(--muted);font-size:9px}
.rply-area{margin-top:7px;display:none}
.rply-area.open{display:block}
.rply-area textarea{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:11px;font-family:var(--font);resize:none;min-height:52px;outline:none;margin-bottom:5px}
.rply-area textarea:focus{border-color:var(--brand)}
.rply-btns{display:flex;gap:5px;justify-content:flex-end}
.del-ann{font-size:10px;color:var(--subtle);background:none;border:none;cursor:pointer;margin-top:3px;display:block}

/* INFO */
.info-row{display:flex;padding:6px 0;border-bottom:1px solid var(--border2);font-size:11px;gap:8px}
.info-row:last-child{border-bottom:none}
.info-lbl{color:var(--muted);font-family:var(--mono);font-size:10px;min-width:105px;flex-shrink:0;padding-top:1px}
.info-val{font-weight:500;flex:1}

/* DECISION */
.decision{padding:13px 15px;border-top:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.dec-lbl{font-size:10px;font-weight:700;color:var(--muted);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;margin-bottom:7px}
.dec-input{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:var(--font);margin-bottom:7px;outline:none;background:var(--bg)}
.dec-input:focus{border-color:var(--brand);background:var(--surface)}
.dec-comment{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:var(--r);font-size:12px;font-family:var(--font);resize:none;min-height:58px;outline:none;margin-bottom:9px;background:var(--bg)}
.dec-comment:focus{border-color:var(--brand);background:var(--surface)}
.dec-btns{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.btn-app{padding:10px;background:var(--brand);color:#fff;border:none;border-radius:var(--r);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all 0.2s}
.btn-app:hover{background:var(--brand-dark)}
.btn-rej{padding:10px;background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);border-radius:var(--r);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all 0.2s}
.btn-rej:hover{background:var(--red);color:#fff}
.btn-rev{padding:8px;background:var(--blue-bg);color:var(--blue);border:1px solid #9ec0f0;border-radius:var(--r);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font);grid-column:1/-1;transition:all 0.2s}
.btn-rev:hover{background:var(--blue);color:#fff}
.dec-result{text-align:center;padding:14px;border-radius:var(--rl)}
.dec-result.app{background:var(--brand-light);border:2px solid var(--brand)}
.dec-result.rej{background:var(--red-bg);border:2px solid var(--red)}
.dec-result.rev{background:var(--blue-bg);border:2px solid var(--blue)}
.dec-result-icon{font-size:26px;margin-bottom:5px}
.dec-result-lbl{font-size:14px;font-weight:800;margin-bottom:2px}
.dec-result-by{font-size:10px;color:var(--muted);font-family:var(--mono)}

/* SUCCESS */
.suc-ov{position:fixed;inset:0;background:rgba(0,0,0,0.72);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px)}
.suc-box{background:var(--surface);border-radius:var(--rxl);padding:44px;text-align:center;max-width:380px;box-shadow:0 8px 48px rgba(0,0,0,0.3)}
.suc-icon{font-size:48px;margin-bottom:12px}
.suc-title{font-size:20px;font-weight:800;margin-bottom:7px;letter-spacing:-0.3px}
.suc-sub{font-size:13px;color:var(--muted);line-height:1.6}

/* ZOOM */
.zoom-ctrl{position:fixed;bottom:80px;right:345px;display:flex;flex-direction:column;gap:4px;z-index:50}
.zoom-btn{width:30px;height:30px;border-radius:6px;background:rgba(0,0,0,0.6);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.1);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.zoom-btn:hover{background:rgba(0,0,0,0.85);color:#fff}
.zoom-val{font-size:9px;font-family:var(--mono);color:rgba(255,255,255,0.4);text-align:center}

/* ERROR */
.err-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:14px;color:rgba(255,255,255,0.35);text-align:center;padding:40px}
.err-icon{font-size:48px;opacity:0.4}
.err-title{font-size:18px;font-weight:700;color:rgba(255,255,255,0.75)}
.err-sub{font-size:12px;font-family:var(--mono);max-width:380px;line-height:1.7}
.err-btn{padding:10px 24px;background:var(--brand);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-family:var(--font);font-weight:600;margin-top:4px}

@media(max-width:768px){
  .layout{flex-direction:column}
  .sidebar{width:100%;max-height:42vh;border-left:none;border-top:1px solid var(--border)}
  .zoom-ctrl{right:10px;bottom:48vh}
}
</style>
</head>

// JSONP
// ══════════════════════════════════════════
function jsonpGet(url) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    const s = document.createElement('script');
    let done = false;
    const t = setTimeout(() => { if(done)return; done=true; cleanup(); reject(new Error('Timed out — check Apps Script deployment settings')); }, 22000);
    window[cb] = d => { if(done)return; done=true; cleanup(); resolve(d); };
    function cleanup(){ clearTimeout(t); delete window[cb]; s.parentNode&&s.parentNode.removeChild(s); }
    s.onerror = () => { if(done)return; done=true; cleanup(); reject(new Error('Script load failed — network or CORS issue')); };
    const sep = url.includes('?')?'&':'?';
    s.src = url + sep + 'callback=' + cb + '&t=' + Date.now();
    document.head.appendChild(s);
  });
}

function jsonpPost(url, data) {
  return new Promise(resolve => {
    const cb = 'cbp_' + Date.now();
    const s = document.createElement('script');
    let done = false;
    const t = setTimeout(() => { if(done)return; done=true; cleanup(); resolve({success:true}); }, 18000);
    window[cb] = d => { if(done)return; done=true; cleanup(); resolve(d); };
    function cleanup(){ clearTimeout(t); delete window[cb]; s.parentNode&&s.parentNode.removeChild(s); }
    s.onerror = () => { cleanup(); resolve({success:true}); };
    const enc = encodeURIComponent(JSON.stringify(data));
    s.src = url + '?action=write&callback=' + cb + '&payload=' + enc + '&t=' + Date.now();
    document.head.appendChild(s);
  });
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
async function init() {
  const params = new URLSearchParams(window.location.search);
  S.jobId = params.get('job');
  S.reviewId = 'rev_' + S.jobId + '_' + Date.now();
  if (!S.jobId) { showError('Invalid Link','No project ID found in URL.'); return; }

  setLoadMsg('Loading project data...');
  try {
    const data = await jsonpGet(SHEETS_URL + '?action=read');
    if (!data || data.error) throw new Error(data?.error || 'No data returned from database');

    S.job = (data.jobs || []).find(j => j.id === S.jobId);
    if (!S.job) { showError('Project Not Found', 'Project ID: ' + S.jobId + ' not found. The link may be outdated.'); return; }

    // Load existing review
    const existing = (data.approvals || []).find(r => r.jobId === S.jobId);
    if (existing) { S.review = existing; S.annotations = existing.annotations || []; S.pinCount = S.annotations.length; }

    // Find files — prefer PDF, fall back to image
    const files = data.designFiles || [];
    S.pdfFile = files.find(f => f.jobId === S.jobId && f.fileType === 'pdf' && f.dataUrl) || null;
    S.imageFile = files.find(f => f.jobId === S.jobId && f.fileType === 'image' && f.dataUrl) || null;

    renderApp();
  } catch(e) {
    showError('Connection Error', e.message + '\n\nEnsure Apps Script is deployed with: Execute as Me · Who can access: Anyone');
  }
}

function setLoadMsg(msg) { const el = document.getElementById('load-msg'); if(el) el.textContent = msg; }

function showError(title, msg) {
  document.getElementById('loading-screen').innerHTML = `
    <div class="err-wrap">
      <div class="err-icon">⚡</div>
      <div class="err-title">${title}</div>
      <div class="err-sub" style="color:rgba(255,255,255,0.4)">${msg}</div>
      <button class="err-btn" onclick="location.reload()">Try Again</button>
    </div>`;
}

// ══════════════════════════════════════════
// RENDER APP
// ══════════════════════════════════════════
async function renderApp() {
  const job = S.job;
  document.getElementById('hdr-ref').textContent = job.ref;
  document.getElementById('hdr-title').textContent = job.title + (job.client ? ' · ' + job.client : '');
  document.getElementById('sb-title').textContent = job.title;
  document.getElementById('sb-sub').textContent = (job.client || '') + (job.brand ? ' · ' + job.brand : '');

  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('zoom-ctrl').style.display = 'flex';

  if (S.pdfFile && S.pdfFile.dataUrl) {
    S.renderMode = 'pdf';
    setLoadMsg('Rendering PDF...');
    document.getElementById('loading-screen').style.display = 'flex';
    await renderPDF(S.pdfFile.dataUrl);
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('page-nav').style.display = 'flex';

  showTab('ann');

}

// ══════════════════════════════════════════
// PDF RENDERING
// ══════════════════════════════════════════
async function renderPDF(dataUrl) {
  try {
    const base64 = dataUrl.split(',')[1];
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

    S.pdfDoc = await pdfjsLib.getDocument({ data: bytes }).promise;
    S.totalPages = S.pdfDoc.numPages;
    S.currentPage = 1;
    updatePageLabel();

    const container = document.getElementById('pages-container');
    container.innerHTML = '';
    container.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:16px;padding:4px';

    // Render all pages
    for (let pageNum = 1; pageNum <= S.totalPages; pageNum++) {
      await renderPDFPage(pageNum);
    }

    // Set up events on first page
    setupPageEvents();
  } catch(e) {
    console.error('PDF render error:', e);
    renderNoFile('PDF could not be rendered: ' + e.message);
  }
}

async function renderPDFPage(pageNum) {
  const page = await S.pdfDoc.getPage(pageNum);
  const viewport = page.getViewport({ scale: S.zoomLevel });

  // Page wrapper
  const wrap = document.createElement('div');
  wrap.className = 'page-wrap';
  wrap.id = 'page-' + pageNum;
  wrap.style.width = viewport.width + 'px';
  wrap.style.height = viewport.height + 'px';
  wrap.dataset.page = pageNum;

  // PDF canvas
  const pdfCanvas = document.createElement('canvas');
  pdfCanvas.className = 'pdf-layer';
  pdfCanvas.width = viewport.width;
  pdfCanvas.height = viewport.height;
  wrap.appendChild(pdfCanvas);

  // Annotation canvas
  const annCanvas = document.createElement('canvas');
  annCanvas.className = 'ann-layer active';
  annCanvas.width = viewport.width;
  annCanvas.height = viewport.height;
  annCanvas.dataset.page = pageNum;
  wrap.appendChild(annCanvas);

  // Pins layer
  const pinsDiv = document.createElement('div');
  pinsDiv.className = 'pins-layer';
  pinsDiv.id = 'pins-' + pageNum;
  wrap.appendChild(pinsDiv);

  document.getElementById('pages-container').appendChild(wrap);

  // Render PDF page
  const ctx = pdfCanvas.getContext('2d');
  await page.render({ canvasContext: ctx, viewport }).promise;

  // Store references
  const annCtx = annCanvas.getContext('2d');
  S.pageCanvases[pageNum] = { pdfCanvas, annCanvas, ctx: annCtx, viewport };

  // Draw existing annotations for this page
  redrawPage(pageNum);
  renderPagePins(pageNum);
}

// ══════════════════════════════════════════
// IMAGE RENDERING
// ══════════════════════════════════════════
function renderImage(dataUrl) {
  const container = document.getElementById('pages-container');
  container.innerHTML = '';
  container.style.cssText = 'display:flex;align-items:center;justify-content:center;padding:4px';

  const wrap = document.createElement('div');
  wrap.className = 'page-wrap';
  wrap.id = 'page-1';
  wrap.dataset.page = '1';

  const img = document.createElement('img');
  img.src = dataUrl;
  img.style.cssText = 'display:block;max-width:100%;height:auto';
  img.onload = () => {
    wrap.style.width = img.offsetWidth + 'px';
    wrap.style.height = img.offsetHeight + 'px';
    setupImageCanvas(img, wrap);
  };
  wrap.appendChild(img);

  const pinsDiv = document.createElement('div');
  pinsDiv.className = 'pins-layer';
  pinsDiv.id = 'pins-1';
  wrap.appendChild(pinsDiv);

  container.appendChild(wrap);
}

function setupImageCanvas(img, wrap) {
  const annCanvas = document.createElement('canvas');
  annCanvas.className = 'ann-layer active';
  annCanvas.width = img.naturalWidth;
  annCanvas.height = img.naturalHeight;
  annCanvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%';
  annCanvas.dataset.page = '1';
  wrap.appendChild(annCanvas);

  const ctx = annCanvas.getContext('2d');
  S.pageCanvases[1] = { annCanvas, ctx, viewport: { width: img.naturalWidth, height: img.naturalHeight } };
  redrawPage(1);
  renderPagePins(1);
  setupPageEvents();
}

function renderNoFile(msg) {
  const container = document.getElementById('pages-container');
  container.innerHTML = `<div class="no-file">
    <div class="no-file-icon">📄</div>
    <div style="font-size:16px;font-weight:600;color:rgba(255,255,255,0.5)">${msg || 'No design file uploaded yet'}</div>
    <div style="font-size:12px;font-family:var(--mono);color:rgba(255,255,255,0.25)">The designer needs to upload a PDF or JPEG in the MIS</div>
  </div>`;
}

// ══════════════════════════════════════════
// PAGE NAV (PDF)
// ══════════════════════════════════════════
function prevPage() {
  if (S.currentPage > 1) { S.currentPage--; scrollToPage(S.currentPage); updatePageLabel(); }
}
function nextPage() {
  if (S.currentPage < S.totalPages) { S.currentPage++; scrollToPage(S.currentPage); updatePageLabel(); }
}
function scrollToPage(n) {
  const el = document.getElementById('page-' + n);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function updatePageLabel() {
  document.getElementById('page-lbl').textContent = 'Page ' + S.currentPage + ' / ' + S.totalPages;
}

// Track current page from scroll
function onScroll() {
  if (S.renderMode !== 'pdf') return;
  for (let i = 1; i <= S.totalPages; i++) {
    const el = document.getElementById('page-' + i);
    if (!el) continue;
    const rect = el.getBoundingClientRect();
    if (rect.top >= 0 || rect.bottom > window.innerHeight / 2) {
      if (S.currentPage !== i) { S.currentPage = i; updatePageLabel(); }
      break;
    }
  }
}

// ══════════════════════════════════════════
// TOOLS
// ══════════════════════════════════════════
function setTool(t) {
  S.tool = t;
  document.querySelectorAll('.tb[id^="tb-"]').forEach(b => b.classList.remove('on'));
  document.getElementById('tb-' + t)?.classList.add('on');
  const scroll = document.getElementById('canvas-scroll');
  const curMap = { pointer: '', pin: ' cur-cell', draw: ' cur-cross', rect: ' cur-cross', arrow: ' cur-cross', text: ' cur-text' };
  scroll.className = 'canvas-scroll' + (curMap[t] || '');
  const hints = {
    pointer: 'Click a pin to view its comment',
    pin: '📍 Click on the design to drop a comment pin',
    draw: '✏️ Click & drag to draw freehand',
    rect: '⬜ Click & drag to draw a rectangle highlight',
    arrow: '↗ Click & drag to draw an arrow',
    text: 'T Click to add a text note',
  };
  document.getElementById('tb-hint').textContent = hints[t] || '';

}

document.getElementById('tb-colour').addEventListener('input', e => S.colour = e.target.value);
document.getElementById('tb-size').addEventListener('input', e => S.strokeSize = parseInt(e.target.value));

// ══════════════════════════════════════════
// CANVAS EVENTS
// ══════════════════════════════════════════
function setupPageEvents() {
  // Attach to all annotation canvases
  document.querySelectorAll('canvas.ann-layer').forEach(canvas => {
    const pageNum = parseInt(canvas.dataset.page);
    canvas.addEventListener('mousedown', e => onDown(e, pageNum));
    canvas.addEventListener('mousemove', e => onMove(e, pageNum));
    canvas.addEventListener('mouseup', e => onUp(e, pageNum));
    canvas.addEventListener('click', e => onClick(e, pageNum));
    canvas.addEventListener('touchstart', e => { e.preventDefault(); onDown(touchEv(e), pageNum); }, { passive: false });
    canvas.addEventListener('touchmove', e => { e.preventDefault(); onMove(touchEv(e), pageNum); }, { passive: false });
    canvas.addEventListener('touchend', e => { e.preventDefault(); onUp(touchEv(e), pageNum); }, { passive: false });
  });

  document.getElementById('canvas-scroll').addEventListener('scroll', onScroll);
}

function touchEv(e) {
  const t = e.touches[0] || e.changedTouches[0];
  return { clientX: t.clientX, clientY: t.clientY };
}

function canvasPos(e, pageNum) {
  const pc = S.pageCanvases[pageNum];
  if (!pc) return null;
  const canvas = pc.annCanvas;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY,
    pctX: ((e.clientX - rect.left) / rect.width) * 100,
    pctY: ((e.clientY - rect.top) / rect.height) * 100,
  };
}

function getCtx(pageNum) {
  return S.pageCanvases[pageNum]?.ctx || null;
}

function onDown(e, pageNum) {
  if (S.review || S.tool === 'pointer' || S.tool === 'pin') return;
  const pos = canvasPos(e, pageNum);
  if (!pos) return;
  S.isDrawing = true;
  S.startPos = pos;
  S.currentDrawPage = pageNum;
  if (S.tool === 'draw') S.drawPath = [{ x: pos.x, y: pos.y }];
}

function onMove(e, pageNum) {
  if (!S.isDrawing || S.review) return;
  const pos = canvasPos(e, pageNum);
  if (!pos) return;
  const ctx = getCtx(pageNum);
  if (!ctx) return;

  if (S.tool === 'draw') {
    S.drawPath.push({ x: pos.x, y: pos.y });
    const path = S.drawPath;
    ctx.beginPath();
    ctx.moveTo(path[path.length - 2].x, path[path.length - 2].y);
    ctx.lineTo(pos.x, pos.y);
    ctx.strokeStyle = S.colour;
    ctx.lineWidth = S.strokeSize;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.globalAlpha = 0.85;
    ctx.stroke();
    ctx.globalAlpha = 1;
  } else {
    redrawPage(pageNum);
    ctx.globalAlpha = 0.85;
    ctx.strokeStyle = S.colour;
    ctx.lineWidth = S.strokeSize;
    const s = S.startPos;
    if (S.tool === 'rect') {
      ctx.strokeRect(s.x, s.y, pos.x - s.x, pos.y - s.y);
      ctx.fillStyle = S.colour;
      ctx.globalAlpha = 0.07;
      ctx.fillRect(s.x, s.y, pos.x - s.x, pos.y - s.y);
    } else if (S.tool === 'arrow') {
      drawArrow(ctx, s.x, s.y, pos.x, pos.y);
    }
    ctx.globalAlpha = 1;
  }
}

function onUp(e, pageNum) {
  if (!S.isDrawing || S.review) return;
  const pos = canvasPos(e, pageNum);
  if (!pos) return;
  S.isDrawing = false;
  const s = S.startPos;

  if (!S.drawings[pageNum]) S.drawings[pageNum] = [];

  if (S.tool === 'draw' && S.drawPath.length > 1) {
    S.drawings[pageNum].push({ type: 'draw', path: [...S.drawPath], colour: S.colour, size: S.strokeSize, id: 'd_' + Date.now() });
  } else if (S.tool === 'rect' && s) {
    S.drawings[pageNum].push({ type: 'rect', x: s.x, y: s.y, w: pos.x - s.x, h: pos.y - s.y, colour: S.colour, size: S.strokeSize, id: 'r_' + Date.now() });
  } else if (S.tool === 'arrow' && s) {
    S.drawings[pageNum].push({ type: 'arrow', x1: s.x, y1: s.y, x2: pos.x, y2: pos.y, colour: S.colour, size: S.strokeSize, id: 'a_' + Date.now() });
  }
  S.drawPath = [];
  S.startPos = null;
  redrawPage(pageNum);
}

function onClick(e, pageNum) {
  if (S.review) return;
  if (S.tool === 'pin') {
    const pos = canvasPos(e, pageNum);
    if (!pos) return;
    closePinPop();
    openPinPop(pos.pctX, pos.pctY, pageNum, e.clientX, e.clientY);
  } else if (S.tool === 'text') {
    const pos = canvasPos(e, pageNum);
    if (!pos) return;
    const txt = prompt('Enter text annotation:');
    if (txt) {
      if (!S.drawings[pageNum]) S.drawings[pageNum] = [];
      S.drawings[pageNum].push({ type: 'text', x: pos.x, y: pos.y, text: txt, colour: S.colour, size: S.strokeSize, id: 't_' + Date.now() });
      redrawPage(pageNum);
    }
  }
}

// ══════════════════════════════════════════
// DRAWING HELPERS
// ══════════════════════════════════════════
function drawArrow(ctx, x1, y1, x2, y2) {
  const ang = Math.atan2(y2 - y1, x2 - x1);
  const hl = Math.max(10, S.strokeSize * 4);
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - hl * Math.cos(ang - Math.PI/7), y2 - hl * Math.sin(ang - Math.PI/7));
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - hl * Math.cos(ang + Math.PI/7), y2 - hl * Math.sin(ang + Math.PI/7));
  ctx.stroke();
}

function redrawPage(pageNum) {
  const pc = S.pageCanvases[pageNum];
  if (!pc) return;
  const ctx = pc.ctx;
  const canvas = pc.annCanvas;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const draws = S.drawings[pageNum] || [];
  draws.forEach(d => {
    ctx.strokeStyle = d.colour;
    ctx.lineWidth = d.size;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.globalAlpha = 0.85;
    if (d.type === 'draw' && d.path && d.path.length > 1) {
      ctx.beginPath();
      ctx.moveTo(d.path[0].x, d.path[0].y);
      d.path.slice(1).forEach(p => ctx.lineTo(p.x, p.y));
      ctx.stroke();
    } else if (d.type === 'rect') {
      ctx.strokeRect(d.x, d.y, d.w, d.h);
      ctx.fillStyle = d.colour;
      ctx.globalAlpha = 0.07;
      ctx.fillRect(d.x, d.y, d.w, d.h);
    } else if (d.type === 'arrow') {
      drawArrow(ctx, d.x1, d.y1, d.x2, d.y2);
    } else if (d.type === 'text') {
      ctx.globalAlpha = 1;
      ctx.fillStyle = d.colour;
      ctx.font = `bold ${Math.max(12, d.size * 4)}px ${getComputedStyle(document.body).fontFamily}`;
      ctx.fillText(d.text, d.x, d.y);
    }
    ctx.globalAlpha = 1;
  });
}

function undoLast() {
  const pg = S.currentDrawPage || S.currentPage || 1;
  if (S.drawings[pg] && S.drawings[pg].length) {
    S.drawings[pg].pop();
    redrawPage(pg);
  }
}

function clearPage() {
  const pg = S.currentDrawPage || S.currentPage || 1;
  if (!confirm('Clear all drawings on page ' + pg + '?')) return;
  S.drawings[pg] = [];
  redrawPage(pg);
}

// ══════════════════════════════════════════
// ZOOM
// ══════════════════════════════════════════
async function applyZoom(factor) {
  if (S.renderMode !== 'pdf') return;
  S.zoomLevel = Math.max(0.5, Math.min(3, S.zoomLevel * factor));
  document.getElementById('zoom-val').textContent = Math.round(S.zoomLevel * 100) + '%';
  S.pageCanvases = {};
  await renderPDF(S.pdfFile.dataUrl);
}
function resetZoom() { S.zoomLevel = 1.2; applyZoom(1); }

// ══════════════════════════════════════════
// PIN COMMENTS
// ══════════════════════════════════════════
function openPinPop(pctX, pctY, pageNum, clientX, clientY) {
  const wrap = document.getElementById('page-' + pageNum);
  if (!wrap) return;

  let leftPct = pctX + 2;
  if (pctX > 60) leftPct = pctX - 45;
  let topPct = pctY;
  if (pctY > 65) topPct = pctY - 35;

  const pop = document.createElement('div');
  pop.className = 'pin-pop';
  pop.id = 'pin-pop';
  pop.style.left = leftPct + '%';
  pop.style.top = topPct + '%';
  pop.innerHTML = `
    <div class="pin-pop-title">📍 Add Comment — Page ${pageNum}</div>
    <textarea id="pin-txt" placeholder="Describe what needs to change or be noted..."></textarea>
    <select id="pin-type">
      <option value="comment">💬 General Comment</option>
      <option value="change">✏️ Change Required</option>
      <option value="error">⚠️ Error / Mistake</option>
      <option value="ok">✓ This part looks good</option>
    </select>
    <div class="pp-btns">
      <button class="pp-save" onclick="savePin(${pctX},${pctY},${pageNum})">Save Pin</button>
      <button class="pp-cancel" onclick="closePinPop()">Cancel</button>
    </div>`;
  wrap.appendChild(pop);
  document.getElementById('pin-txt').focus();
}

function closePinPop() {
  const p = document.getElementById('pin-pop');
  if (p) p.remove();
}

function savePin(pctX, pctY, pageNum) {
  const txt = document.getElementById('pin-txt')?.value.trim();
  const type = document.getElementById('pin-type')?.value || 'comment';
  if (!txt) { alert('Please enter a comment'); return; }
  const num = ++S.pinCount;
  S.annotations.push({
    id: 'ann_' + Date.now(),
    type: 'pin', pinType: type, num, pageNum,
    x: pctX, y: pctY,
    text: txt, replies: [],
    reviewer: 'Reviewer',
    createdAt: new Date().toISOString()
  });
  closePinPop();
  renderPagePins(pageNum);
  renderAnnList();
  setTimeout(() => selectAnn(S.annotations[S.annotations.length - 1].id), 80);
}

function renderPagePins(pageNum) {
  const wrap = document.getElementById('pins-' + pageNum);
  if (!wrap) return;
  wrap.innerHTML = '';
  S.annotations.filter(a => a.pageNum === pageNum).forEach(ann => {
    const pin = document.createElement('div');
    const colCls = { comment: 'pin-comment', change: 'pin-change', error: 'pin-error', ok: 'pin-ok' }[ann.pinType] || 'pin-comment';
    pin.className = `pin ${colCls}${S.selectedAnn === ann.id ? ' sel' : ''}`;
    pin.style.left = `calc(${ann.x}% - 8px)`;
    pin.style.top = `calc(${ann.y}% - 22px)`;
    pin.title = ann.text;
    pin.innerHTML = `<span class="pin-n">${ann.num}</span>`;
    pin.onclick = e => { e.stopPropagation(); selectAnn(ann.id); };
    wrap.appendChild(pin);
  });
}

function renderAllPins() {
  for (let i = 1; i <= Math.max(S.totalPages, 1); i++) renderPagePins(i);
}

function selectAnn(id) {
  S.selectedAnn = id;
  renderAllPins();
  showTab('ann');
  setTimeout(() => {
    const el = document.getElementById('a_' + id);
    if (el) { el.classList.add('sel'); el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
    document.querySelectorAll('.ann-item').forEach(x => { if (x.id !== 'a_' + id) x.classList.remove('sel'); });
  }, 60);
  // Scroll PDF to pin's page
  const ann = S.annotations.find(a => a.id === id);
  if (ann && ann.pageNum && S.renderMode === 'pdf') {
    scrollToPage(ann.pageNum);
    S.currentPage = ann.pageNum;
    updatePageLabel();
  }
}

// ══════════════════════════════════════════
// ANNOTATION LIST
// ══════════════════════════════════════════
const dotCols = { comment: '#5AB544', change: '#c47d10', error: '#991f1f', ok: '#1456a0' };
const typeIcons = { comment: '💬', change: '✏️', error: '⚠️', ok: '✓' };
const typeLbls = { comment: 'Comment', change: 'Change Required', error: 'Error / Mistake', ok: 'Looks Good' };

function renderAnnList() {
  const el = document.getElementById('sb-body');
  if (el.dataset.tab !== 'ann') return;
  let html = `<div class="ann-tip">📍 <b>Pin</b> — click design to comment · ✏️ <b>Draw</b> — freehand · ⬜ <b>Rect</b> — highlight area · ↗ <b>Arrow</b> — point to area</div>`;
  if (!S.annotations.length) {
    html += `<div class="ann-empty">No annotations yet.<br>Use the tools above to annotate.</div>`;
  } else {
    html += S.annotations.map(ann => `
      <div class="ann-item ${ann.pinType === 'error' ? 'te' : ann.pinType === 'change' ? 'tc' : ''}" id="a_${ann.id}" onclick="selectAnn('${ann.id}')">
        <div class="ann-head">
          <div class="ann-dot" style="background:${dotCols[ann.pinType] || dotCols.comment}">${ann.num || '✏'}</div>
          <div>
            <div class="ann-type">${typeIcons[ann.pinType] || '💬'} ${typeLbls[ann.pinType] || 'Comment'}</div>
            ${ann.pageNum ? `<div class="ann-pg">Page ${ann.pageNum}</div>` : ''}
          </div>
          <div class="ann-time">${fmtTime(ann.createdAt)}</div>
        </div>
        <div class="ann-text">${ann.text}</div>
        <div class="ann-who">${ann.reviewer || 'Reviewer'}</div>
        ${ann.replies && ann.replies.length ? `<div class="ann-replies">${ann.replies.map(r => `<div class="rply"><div class="rply-who">${r.author} · ${fmtTime(r.createdAt)}</div>${r.text}</div>`).join('')}</div>` : ''}
        ${!S.review ? `
          <span class="ann-rply-btn" onclick="event.stopPropagation();toggleReply('${ann.id}')">↩ Reply</span>
          <div class="rply-area" id="ra_${ann.id}">
            <textarea placeholder="Type a reply..."></textarea>
            <div class="rply-btns">
              <button style="padding:4px 10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:11px;font-family:var(--font)" onclick="toggleReply('${ann.id}')">Cancel</button>
              <button style="padding:4px 10px;background:var(--brand);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-family:var(--font);font-weight:600" onclick="saveReply('${ann.id}')">Send</button>
            </div>
          </div>
          <button class="del-ann" onclick="event.stopPropagation();delAnn('${ann.id}')">✕ Remove</button>
        ` : ''}
      </div>`).join('');
  }
  el.innerHTML = html;
  if (S.selectedAnn) { const sel = document.getElementById('a_' + S.selectedAnn); if (sel) sel.classList.add('sel'); }
}

function toggleReply(id) {
  const el = document.getElementById('ra_' + id);
  if (!el) return;
  el.classList.toggle('open');
  if (el.classList.contains('open')) el.querySelector('textarea')?.focus();
}
function saveReply(annId) {
  const el = document.getElementById('ra_' + annId);
  const txt = el?.querySelector('textarea')?.value.trim();
  if (!txt) return;
  const ann = S.annotations.find(a => a.id === annId);
  if (!ann) return;
  if (!ann.replies) ann.replies = [];
  ann.replies.push({ text: txt, author: 'Reviewer', createdAt: new Date().toISOString() });
  renderAnnList();
}
function delAnn(annId) {
  S.annotations = S.annotations.filter(a => a.id !== annId);
  if (S.selectedAnn === annId) S.selectedAnn = null;
  renderAllPins();
  renderAnnList();
}

// ══════════════════════════════════════════
// TABS
// ══════════════════════════════════════════
function showTab(t) {
  document.querySelectorAll('.sbt').forEach(x => x.classList.remove('on'));
  document.getElementById('sbt-' + t)?.classList.add('on');
  const el = document.getElementById('sb-body');
  el.dataset.tab = t;
  if (t === 'ann') renderAnnList();
  else showInfoTab();
}

function showInfoTab() {
  const job = S.job;
  const fields = [
    ['Project', job.title], ['Client', job.client], ['Brand', job.brand],
    ['Type', job.projectType], ['Design Type', job.designType || job.desType],
    ['Stage', job.status], ['Due Date', job.dueDate],
    ['Packaging Type', job.packagingType], ['Pack Format', job.packFormat],
    ['Dimensions', job.dimensions], ['Substrate', job.substrate],
    ['Print Process', job.printProcess], ['Screen Ruling', job.screenRuling],
    ['Colour System', job.colourSystem],
    ['Total Colours', job.totalColours ? job.totalColours + ' colours' : null],
    ['White Required', job.whiteRequired ? 'Yes' : null],
    ['Barcode', job.barcodeRequired],
    ['Target Market', job.targetMarket],
    ['Look & Feel', job.lookAndFeel],
  ].filter(([, v]) => v);

  let html = `<div style="font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--brand-dark);font-family:var(--mono);margin-bottom:10px">SPECIFICATIONS</div>
    ${fields.map(([l, v]) => `<div class="info-row"><div class="info-lbl">${l}</div><div class="info-val">${v}</div></div>`).join('')}`;

  if (job.pantones && job.pantones.length) {
    html += `<div class="info-row"><div class="info-lbl">Pantones</div><div class="info-val"><div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:2px">
      ${job.pantones.map(p => `<span style="display:inline-flex;align-items:center;gap:3px;background:var(--bg);border:1px solid var(--border);padding:2px 7px;border-radius:10px;font-size:9px;font-family:var(--mono)">
        ${p.hex ? `<span style="width:9px;height:9px;border-radius:50%;background:${p.hex};border:1px solid rgba(0,0,0,0.12)"></span>` : ''}${p.ref}</span>`).join('')}
    </div></div></div>`;
  }

  if (job.summary || job.brief) {
    html += `<div style="margin-top:12px;font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--brand-dark);font-family:var(--mono);margin-bottom:7px">BRIEF</div>
      <div style="font-size:11px;line-height:1.6;padding:10px;background:var(--bg);border-radius:var(--r);border-left:3px solid var(--brand)">${job.summary || job.brief}</div>`;
  }

  document.getElementById('sb-body').innerHTML = html;
}

// ══════════════════════════════════════════
// DECISION
// ══════════════════════════════════════════
async function submitDecision(decision) {
  const name = document.getElementById('dec-name')?.value.trim();
  const comment = document.getElementById('dec-cmt')?.value.trim();
  if (!name) { document.getElementById('dec-name').style.borderColor = 'var(--red)'; alert('Please enter your name.'); return; }

  S.annotations.forEach(a => { if (a.reviewer === 'Reviewer') a.reviewer = name; });

  const review = {
    reviewId: S.reviewId, jobId: S.jobId,
    jobRef: S.job.ref, jobTitle: S.job.title, client: S.job.client,
    decision, reviewerName: name, reviewerComment: comment,
    annotations: S.annotations,
    submittedAt: new Date().toISOString()
  };
  S.review = review;

  updatePill(decision);
  showDecisionResult(review);
  showSuccess(decision, name);

  try {
    const currentData = await jsonpGet(SHEETS_URL + '?action=read');
    if (!currentData.approvals) currentData.approvals = [];
    const idx = currentData.approvals.findIndex(r => r.jobId === S.jobId);
    if (idx >= 0) currentData.approvals[idx] = review;
    else currentData.approvals.push(review);
    const ji = (currentData.jobs || []).findIndex(j => j.id === S.jobId);
    if (ji >= 0) {
      currentData.jobs[ji].clientApproval = { approved: 'Approved', rejected: 'Rejected', revision: 'Revision Requested' }[decision];
      currentData.jobs[ji].lastReviewer = name;
    }
    // Strip base64 to keep payload manageable
    if (currentData.designFiles) {
      currentData.designFiles = currentData.designFiles.map(f => ({ ...f, dataUrl: f.dataUrl ? '[stored]' : null }));
    }
    await jsonpPost(SHEETS_URL, currentData);
    await jsonpGet(SHEETS_URL + '?action=sendEmail' +
      '&jobRef=' + encodeURIComponent(review.jobRef) +
      '&jobTitle=' + encodeURIComponent(review.jobTitle) +
      '&decision=' + encodeURIComponent(decision) +
      '&reviewer=' + encodeURIComponent(name) +
      '&comment=' + encodeURIComponent(comment || '') +
      '&annotations=' + S.annotations.length +
      '&client=' + encodeURIComponent(review.client || '')
    );
  } catch(e) { console.warn('Save note:', e.message); }
}

function updatePill(decision) {
  const pill = document.getElementById('hdr-pill');
  if (!pill) return;
  const map = { approved: ['pill-approved', '✓ Approved'], rejected: ['pill-rejected', '✕ Rejected'], revision: ['pill-revision', '↩ Revisions'] };
  const [cls, txt] = map[decision] || ['pill-pending', 'Awaiting Review'];
  pill.className = 'pill ' + cls;
  pill.textContent = txt;
}

function showDecisionResult(review) {
  const panel = document.getElementById('dec-panel');
  const map = {
    approved: { icon: '✅', lbl: 'Design Approved', cls: 'app', col: 'var(--brand-dark)' },
    rejected: { icon: '❌', lbl: 'Design Rejected', cls: 'rej', col: 'var(--red)' },
    revision: { icon: '🔄', lbl: 'Revisions Requested', cls: 'rev', col: 'var(--blue)' },
  };
  const s = map[review.decision] || {};
  panel.innerHTML = `
    <div class="dec-result ${s.cls}">
      <div class="dec-result-icon">${s.icon}</div>
      <div class="dec-result-lbl" style="color:${s.col}">${s.lbl}</div>
      <div class="dec-result-by">${review.reviewerName} · ${new Date(review.submittedAt).toLocaleDateString('en-ZA')}</div>
      ${review.reviewerComment ? `<div style="font-size:11px;margin-top:5px;color:var(--muted)">"${review.reviewerComment}"</div>` : ''}
    </div>
    <div style="font-size:10px;text-align:center;color:var(--subtle);font-family:var(--mono);margin-top:7px">Storm43 has been notified.</div>`;
}

function showSuccess(decision, name) {
  const map = {
    approved: { icon: '🎉', title: 'Design Approved!', sub: `Thank you ${name}! Storm43 will proceed with production.` },
    rejected: { icon: '📋', title: 'Feedback Submitted', sub: `Thank you ${name}. Your ${S.annotations.length} annotation${S.annotations.length !== 1 ? 's' : ''} have been sent to Storm43.` },
    revision: { icon: '✏️', title: 'Revisions Requested', sub: `Thank you ${name}. Your comments have been sent to the Storm43 studio.` },
  };
  const s = map[decision] || { icon: '✓', title: 'Submitted', sub: 'Thank you.' };
  document.getElementById('suc-icon').textContent = s.icon;
  document.getElementById('suc-title').textContent = s.title;
  document.getElementById('suc-sub').textContent = s.sub;
  const ov = document.getElementById('suc-ov');
  ov.style.display = 'flex';
  setTimeout(() => ov.style.display = 'none', 6000);
}

function fmtTime(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' }); } catch(e) { return ''; }
}

init();
</script>
</body>
</html>
