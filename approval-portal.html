<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storm43 — Design Approval</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#5AB544;--brand-dark:#3d8a2e;--brand-light:#eaf5e6;--brand-mid:#c8e8c0;
  --dark:#0e0e0d;--dark2:#171715;
  --bg:#f4f3ef;--surface:#fff;--border:#e0dfd9;
  --text:#18180f;--muted:#6b6b60;--subtle:#a8a89a;
  --amber:#c47d10;--amber-bg:#fdf0d6;--amber-border:#f0c96a;
  --red:#991f1f;--red-bg:#fdf0f0;--red-border:#f5b8b8;
  --blue:#1456a0;--blue-bg:#e8f0fc;
  --font:'Syne',sans-serif;--mono:'DM Mono',monospace;
  --r:8px;--rl:12px;--rxl:18px;
}
body{font-family:var(--font);background:#1e1e1b;color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}

#ls{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:9999;padding:24px;text-align:center}
.lb{width:200px;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.lf{height:100%;background:var(--brand);animation:la 1.6s ease-in-out infinite}
@keyframes la{0%{width:0;margin-left:0}50%{width:60%;margin-left:0}100%{width:0;margin-left:100%}}
.lm{font-size:11px;color:rgba(255,255,255,0.3);font-family:var(--mono);letter-spacing:1px}
.ld{font-size:11px;color:rgba(255,255,255,0.15);font-family:var(--mono);max-width:380px;line-height:1.7;margin-top:4px}

.hdr{background:var(--dark);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;height:50px}
.hdr img{height:28px}
.hdr-mid{flex:1;padding:0 16px;text-align:center}
.hdr-ref{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--brand);letter-spacing:1px}
.hdr-title{font-size:11px;color:rgba(255,255,255,0.4);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:320px;margin:0 auto}
.pill{padding:4px 12px;border-radius:20px;font-size:10px;font-weight:700;font-family:var(--mono)}
.pp{background:#fdf0d6;color:#c47d10;border:1px solid #f0c96a}
.pa{background:var(--brand-light);color:var(--brand-dark);border:1px solid var(--brand-mid)}
.pr{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.pv{background:var(--blue-bg);color:var(--blue);border:1px solid #9ec0f0}

#app{display:none;flex-direction:column;height:100vh}
.layout{display:flex;flex:1;overflow:hidden}
.viewer{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#2a2a27;min-width:0}

.toolbar{background:#111;padding:7px 14px;display:flex;align-items:center;gap:5px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.06);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tb{width:32px;height:32px;border-radius:6px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.55);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.15s;flex-shrink:0}
.tb:hover{background:rgba(255,255,255,0.1);color:#fff}
.tb.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.tb-sep{width:1px;height:20px;background:rgba(255,255,255,0.07);margin:0 3px;flex-shrink:0}
.tb-lbl{font-size:9px;color:rgba(255,255,255,0.2);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;flex-shrink:0}
.tb-col{width:28px;height:28px;border-radius:5px;border:2px solid rgba(255,255,255,0.12);cursor:pointer;padding:0;flex-shrink:0}
.tb-rng{width:70px;accent-color:var(--brand);cursor:pointer;flex-shrink:0}
.tb-hint{font-size:10px;color:rgba(255,255,255,0.2);font-family:var(--mono);margin-left:auto;white-space:nowrap}
.pnav{display:flex;align-items:center;gap:5px;flex-shrink:0}
.pnav button{padding:3px 8px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:rgba(255,255,255,0.55);cursor:pointer;font-size:12px;font-family:var(--mono)}
.pnav button:hover{background:rgba(255,255,255,0.12);color:#fff}
.plbl{font-size:10px;color:rgba(255,255,255,0.35);font-family:var(--mono)}

.cscroll{flex:1;overflow:auto;display:flex;flex-direction:column;align-items:center;padding:20px;gap:16px;position:relative}
.cscroll.cur-zoom-in{cursor:zoom-in}
.pw{transition:none}
.pw{position:relative;flex-shrink:0;box-shadow:0 4px 32px rgba(0,0,0,0.5);border-radius:3px;background:#fff}
.pw canvas{display:block;border-radius:3px}
.al{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:3px}
.pin-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}

.nf{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:420px;gap:14px;color:rgba(255,255,255,0.25);text-align:center;padding:40px}
.nf-icon{font-size:52px;opacity:0.3}
.nf-title{font-size:16px;font-weight:600;color:rgba(255,255,255,0.45)}
.nf-sub{font-size:12px;font-family:var(--mono);opacity:0.6;max-width:340px;line-height:1.7}

.pin{position:absolute;width:24px;height:24px;border-radius:50% 50% 50% 2px;transform:rotate(-45deg);transform-origin:bottom left;cursor:pointer;display:flex;align-items:center;justify-content:center;pointer-events:all;box-shadow:0 2px 8px rgba(0,0,0,0.5);border:2px solid rgba(255,255,255,0.3);transition:transform 0.15s;z-index:20}
.pin:hover,.pin.sel{transform:rotate(-45deg) scale(1.2);box-shadow:0 0 0 3px rgba(255,255,255,0.25),0 2px 10px rgba(0,0,0,0.5)}
.pn{transform:rotate(45deg);font-size:9px;font-weight:800;color:#fff;font-family:var(--mono)}
.pc{background:#5AB544}.pch{background:#c47d10}.pe{background:#991f1f}.pok{background:#1456a0}

.ppop{position:absolute;z-index:300;background:var(--surface);border:1.5px solid var(--brand);border-radius:12px;padding:14px;min-width:230px;max-width:270px;box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.ppop h4{font-size:11px;font-weight:700;color:var(--brand-dark);font-family:var(--mono);margin-bottom:8px}
.ppop textarea{width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--font);resize:none;min-height:75px;outline:none;margin-bottom:7px;background:var(--bg);display:block}
.ppop textarea:focus{border-color:var(--brand);background:#fff}
.ppop select{width:100%;padding:6px 9px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--font);margin-bottom:9px;outline:none;background:#fff}
.pp-btns{display:flex;gap:6px}
.pps{flex:1;padding:8px;background:var(--brand);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;font-family:var(--font)}
.ppc{padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:12px;font-family:var(--font)}

.sidebar{width:280px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sbh{padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.sbh-title{font-size:13px;font-weight:700;margin-bottom:2px}
.sbh-sub{font-size:10px;color:var(--muted);font-family:var(--mono)}
.sbtabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.sbt{flex:1;padding:9px;text-align:center;font-size:10px;font-weight:700;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all 0.15s;font-family:var(--mono);letter-spacing:0.5px;text-transform:uppercase}
.sbt.on{color:var(--brand-dark);border-bottom-color:var(--brand);background:var(--brand-light)}
.sb-body{flex:1;overflow-y:auto;padding:12px}

.atip{font-size:11px;color:var(--muted);padding:8px 10px;background:var(--bg);border-radius:6px;margin-bottom:10px;line-height:1.5;border-left:3px solid var(--brand-mid)}
.aitem{border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:7px;cursor:pointer;transition:all 0.15s}
.aitem:hover{border-color:var(--brand-mid);background:#f8fdf5}
.aitem.sel{border-color:var(--brand);background:var(--brand-light)}
.aitem.tc{border-color:var(--red-border);background:var(--red-bg)}
.ahead{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.adot{width:20px;height:20px;border-radius:50%;color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;font-family:var(--mono);flex-shrink:0}
.atype{font-size:10px;font-family:var(--mono);color:var(--muted)}
.apg{font-size:9px;font-family:var(--mono);color:var(--subtle)}
.atime{font-size:9px;color:var(--subtle);margin-left:auto;font-family:var(--mono)}
.atext{font-size:12px;line-height:1.45;margin-bottom:3px}
.awho{font-size:10px;color:var(--muted);font-family:var(--mono)}
.areplybtn{font-size:11px;color:var(--blue);cursor:pointer;margin-top:5px;display:inline-block}
.areplies{margin-top:7px;padding-top:7px;border-top:1px solid var(--border)}
.areply{font-size:11px;padding:5px 8px;background:var(--bg);border-radius:4px;margin-bottom:3px;line-height:1.4}
.areply-who{font-family:var(--mono);color:var(--muted);font-size:9px}
.rarea{margin-top:7px;display:none}
.rarea.open{display:block}
.rarea textarea{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:11px;font-family:var(--font);resize:none;min-height:50px;outline:none;margin-bottom:5px;background:var(--bg)}
.rarea textarea:focus{border-color:var(--brand);background:#fff}
.rbtns{display:flex;gap:5px;justify-content:flex-end}
.delbtn{font-size:10px;color:var(--subtle);background:none;border:none;cursor:pointer;margin-top:3px;display:block}

.irow{display:flex;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px;gap:8px}
.irow:last-child{border-bottom:none}
.ilbl{color:var(--muted);font-family:var(--mono);font-size:10px;min-width:100px;flex-shrink:0}
.ival{font-weight:500;flex:1}

.dec{padding:12px 14px;border-top:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.dec-lbl{font-size:10px;font-weight:700;color:var(--muted);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;margin-bottom:7px}
.dec-inp{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:var(--font);margin-bottom:7px;outline:none;background:var(--bg)}
.dec-inp:focus{border-color:var(--brand);background:#fff}
.dec-cmt{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:var(--r);font-size:12px;font-family:var(--font);resize:none;min-height:55px;outline:none;margin-bottom:9px;background:var(--bg)}
.dec-cmt:focus{border-color:var(--brand);background:#fff}
.dec-btns{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.btn-a{padding:10px;background:var(--brand);color:#fff;border:none;border-radius:var(--r);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all 0.2s}
.btn-a:hover{background:var(--brand-dark)}
.btn-r{padding:10px;background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);border-radius:var(--r);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all 0.2s}
.btn-r:hover{background:var(--red);color:#fff}
.btn-v{padding:8px;background:var(--blue-bg);color:var(--blue);border:1px solid #9ec0f0;border-radius:var(--r);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font);grid-column:1/-1;transition:all 0.2s}
.btn-v:hover{background:var(--blue);color:#fff}
.dec-done{text-align:center;padding:14px;border-radius:var(--rl)}
.dec-done.a{background:var(--brand-light);border:2px solid var(--brand)}
.dec-done.r{background:var(--red-bg);border:2px solid var(--red)}
.dec-done.v{background:var(--blue-bg);border:2px solid var(--blue)}
.dec-done-icon{font-size:26px;margin-bottom:5px}
.dec-done-lbl{font-size:14px;font-weight:800;margin-bottom:2px}
.dec-done-by{font-size:10px;color:var(--muted);font-family:var(--mono)}

.iter-bar{padding:9px 20px;background:var(--amber-bg);border-bottom:1px solid var(--amber-border);font-size:12px;color:var(--amber);font-family:var(--mono);display:none;align-items:center;gap:8px;flex-shrink:0}

.sov{position:fixed;inset:0;background:rgba(0,0,0,0.72);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px)}
.sbox{background:var(--surface);border-radius:var(--rxl);padding:40px;text-align:center;max-width:360px;box-shadow:0 8px 48px rgba(0,0,0,0.3)}
.sicon{font-size:48px;margin-bottom:12px}
.stitle{font-size:20px;font-weight:800;margin-bottom:7px}
.ssub{font-size:13px;color:var(--muted);line-height:1.6}

.zc{position:fixed;bottom:20px;right:295px;display:flex;flex-direction:column;gap:4px;z-index:50;display:none}
.zb{width:30px;height:30px;border-radius:6px;background:rgba(0,0,0,0.65);color:rgba(255,255,255,0.65);border:1px solid rgba(255,255,255,0.1);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.zb:hover{background:rgba(0,0,0,0.9);color:#fff}
.zv{font-size:9px;font-family:var(--mono);color:rgba(255,255,255,0.35);text-align:center}

@media(max-width:768px){
  .layout{flex-direction:column}
  .sidebar{width:100%;max-height:42vh;border-left:none;border-top:1px solid var(--border)}
  .zc{right:10px;bottom:44vh}
  .cscroll{padding:12px}
}
@media(min-width:769px){
  .viewer{min-width:0;flex:1}
  .cscroll{padding:16px 20px}
}
</style>
</head>

    s.onerror=()=>{if(done)return;done=true;cleanup();rej(new Error('Network error loading script'));};
    function cleanup(){clearTimeout(t);delete window[cb];s.parentNode&&s.parentNode.removeChild(s);}
    s.src=url+(url.includes('?')?'&':'?')+'callback='+cb+'&t='+Date.now();
    document.head.appendChild(s);
  });
}

function jpost(url,data){
  // POST approval data (no large files — those stay in localStorage)
  return new Promise(res=>{
    const cb='jp_'+Date.now();
    const s=document.createElement('script');
    let done=false;
    const t=setTimeout(()=>{if(done)return;done=true;cleanup();res({success:true});},18000);
    window[cb]=d=>{if(done)return;done=true;cleanup();res(d);};
    s.onerror=()=>{cleanup();res({success:true});};
    function cleanup(){clearTimeout(t);delete window[cb];s.parentNode&&s.parentNode.removeChild(s);}
    // Strip design file dataUrls from POST — they live in localStorage only
    const payload={...data,designFiles:(data.designFiles||[]).map(f=>({
      id:f.id,jobId:f.jobId,name:f.name,size:f.size,
      fileType:f.fileType,notes:f.notes,
      uploadedAt:f.uploadedAt,uploadedBy:f.uploadedBy,
      linkedPdfId:f.linkedPdfId,linkedPdfName:f.linkedPdfName,
      hasData:true
    }))};
    const enc=encodeURIComponent(JSON.stringify(payload));
    s.src=url+'?action=write&callback='+cb+'&payload='+enc+'&t='+Date.now();
    document.head.appendChild(s);
  });
}

// ── LOCAL STORAGE FILE ACCESS ──
// MIS saves: localStorage["s43_file_{jobId}"] = {dataUrl, name, fileType, uploadedAt}
// Portal reads same key — works because same domain (github.io)
function getFileFromStorage(jobId){
  try{
    // Try latest file first
    const key='s43_file_'+jobId;
    const raw=localStorage.getItem(key);
    if(raw){
      const f=JSON.parse(raw);
      if(f&&f.dataUrl)return f;
    }
    // Try legacy keys
    const legacyKeys=['storm43_v4','storm43_v3','storm43_backup'];
    for(const lk of legacyKeys){
      const d=localStorage.getItem(lk);
      if(!d)continue;
      const state=JSON.parse(d);
      const files=(state.designFiles||[]).filter(f=>f.jobId===jobId&&f.dataUrl&&f.dataUrl.length>100);
      if(files.length){
        // Return most recent
        const latest=files.sort((a,b)=>new Date(b.uploadedAt)-new Date(a.uploadedAt))[0];
        return latest;
      }
    }
  }catch(e){console.warn('Storage read:',e);}
  return null;
}

// ── INIT ──
async function init(){
  const params=new URLSearchParams(window.location.search);
  S.jobId=params.get('job');
  if(!S.jobId){showErr('Invalid Link','No project ID found in this URL.');return;}

  setMsg('Connecting to database...','Loading project details from Google Sheets');

  try{
    const data=await jget(SHEETS_URL+'?action=read');
    if(!data||data.error)throw new Error(data?.error||'No data returned from database');

    S.job=(data.jobs||[]).find(j=>j.id===S.jobId);
    if(!S.job){
      // Try to get job info from URL params as fallback
      const n=params.get('name'),c=params.get('client'),r=params.get('ref');
      if(n&&r){S.job={id:S.jobId,title:n,client:c||'',ref:r,status:'In Review'};}
      else{showErr('Project Not Found','Project ID "'+S.jobId+'" not found in database.<br>The link may be outdated or the project was deleted.');return;}
    }

    // Reviews
    S.allReviews=(data.approvals||[]).filter(r=>r.jobId===S.jobId).sort((a,b)=>new Date(a.submittedAt)-new Date(b.submittedAt));
    const latest=S.allReviews[S.allReviews.length-1];
    S.iteration=S.allReviews.length+1;
    if(latest&&latest.decision==='approved'){
      S.currentReview=latest;
      S.annotations=latest.annotations||[];
      S.pinCount=S.annotations.length;
      S.iteration=S.allReviews.length;
    }

    // ── FILE LOADING — 3 sources, priority order ──
    let fileData = null;

    // SOURCE 1: Google Drive URL (works on ANY device, best for clients)
    const driveFiles = (data.driveFiles||[]).filter(d=>d.jobId===S.jobId);
    const latestDrive = driveFiles.length ? driveFiles[driveFiles.length-1] : null;
    // Also check job record directly for Drive URL
    const jobDriveUrl = S.job.driveEmbedUrl || S.job.driveViewUrl || null;
    const driveEmbedUrl = latestDrive?.embedUrl || jobDriveUrl || null;

    if(driveEmbedUrl){
      setMsg('Loading design from Google Drive...','');
      // Use Drive embed URL — rendered in iframe
      fileData = {
        type: 'drive',
        embedUrl: driveEmbedUrl,
        viewUrl: latestDrive?.viewUrl || S.job.driveViewUrl,
        name: latestDrive?.fileName || 'Design',
        fileType: 'drive'
      };
    }

    // SOURCE 2: localStorage (same browser, same device as MIS)
    if(!fileData){
      setMsg('Checking local storage...','');
      const localFile = getFileFromStorage(S.jobId);
      if(localFile && localFile.dataUrl){
        fileData = localFile;
      }
    }

    // SOURCE 3: Sheets designFiles (if dataUrl stored there)
    if(!fileData){
      setMsg('Checking database for file...','');
      const sheetFiles=(data.designFiles||[]).filter(f=>f.jobId===S.jobId);
      const pdfInSheet=sheetFiles.find(f=>f.fileType==='pdf'&&f.dataUrl&&f.dataUrl.length>200&&!f.dataUrl.startsWith('['));
      const imgInSheet=sheetFiles.find(f=>f.fileType==='image'&&f.dataUrl&&f.dataUrl.length>200&&!f.dataUrl.startsWith('['));
      if(pdfInSheet) fileData={dataUrl:pdfInSheet.dataUrl,fileType:'pdf',name:pdfInSheet.name};
      else if(imgInSheet) fileData={dataUrl:imgInSheet.dataUrl,fileType:'image',name:imgInSheet.name};
    }

    S.fileData = fileData || null;
    S.driveEmbedUrl = driveEmbedUrl;
    renderApp();

  }catch(e){
    showErr('Connection Error',
      e.message+'<br><br>'+
      'Checklist:<br>'+
      '1. Apps Script deployed: Execute as <b>Me</b>, Access: <b>Anyone</b><br>'+
      '2. Redeployed as <b>New version</b> after last edit<br>'+
      '3. Internet connection active');
  }
}

// ── RENDER APP ──
async function renderApp(){
  const job=S.job;
  document.getElementById('hdr-ref').textContent=job.ref||S.jobId;
  document.getElementById('hdr-title').textContent=job.title+(job.client?' · '+job.client:'');
  document.getElementById('sb-title').textContent=job.title||'Design Review';

  if(latest&&latest.decision!=='approved'){
    const ib=document.getElementById('iter-bar');
    ib.style.display='flex';
    const decLbl={rejected:'rejected',revision:'revision requested'}[latest.decision]||latest.decision;
    document.getElementById('iter-msg').textContent=
      `Iteration ${S.iteration} — version ${S.allReviews.length} was ${decLbl} by ${latest.reviewerName}. Please review the updated design.`;
  }

  document.getElementById('ls').style.display='none';
  document.getElementById('app').style.display='flex';

  if(S.fileData){
    if(S.fileData.fileType==='drive'||S.fileData.type==='drive'){
      // Google Drive embed — best quality, works on all devices
      S.renderMode='drive';
      renderDriveEmbed(S.fileData.embedUrl, S.fileData.viewUrl, S.fileData.name);
    } else if(S.fileData.fileType==='pdf'||S.fileData.name?.toLowerCase().endsWith('.pdf')){
      S.renderMode='pdf';
      document.getElementById('ls').style.display='flex';

      document.getElementById('ls').style.display='none';

    renderNoFile();
  }

  showTab('ann');
  if(S.currentReview){updatePill(S.currentReview.decision);showDecisionDone(S.currentReview);}
}

// ── PDF ──
async function renderPDF(dataUrl){
  try{
    const b64=dataUrl.includes(',')?dataUrl.split(',')[1]:dataUrl;
    const bin=atob(b64);
    const bytes=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);

    S.pdfDoc=await pdfjsLib.getDocument({data:bytes}).promise;
    S.totalPages=S.pdfDoc.numPages;
    S.currentPage=1;
    updatePlbl();

    const wrap=document.getElementById('pgwrap');
    wrap.innerHTML='';
    wrap.style.cssText='display:flex;flex-direction:column;align-items:center;gap:16px;padding:8px 4px';

    for(let pn=1;pn<=S.totalPages;pn++){
      setMsg('Rendering page '+pn+' of '+S.totalPages+'...','');
      await renderPDFPage(pn);
    }
    setupEvents();
  }catch(e){
    console.error('PDF error:',e);
    document.getElementById('ls').style.display='none';
    document.getElementById('pgwrap').innerHTML=`<div class="nf">
      <div class="nf-icon">📄</div>
      <div class="nf-title">PDF could not be rendered</div>
      <div class="nf-sub">${e.message}<br><br>Try re-uploading the PDF in the MIS as a smaller file (under 5MB recommended).</div>
    </div>`;
  }
}

async function renderPDFPage(pn){
  const page=await S.pdfDoc.getPage(pn);
  const vp=page.getViewport({scale:S.zoom});

  const pw=document.createElement('div');
  pw.className='pw';pw.id='pw-'+pn;pw.dataset.page=pn;
  pw.style.width=vp.width+'px';pw.style.height=vp.height+'px';

  const pdfC=document.createElement('canvas');
  pdfC.width=vp.width;pdfC.height=vp.height;
  pw.appendChild(pdfC);

  const annC=document.createElement('canvas');
  annC.className='al';annC.width=vp.width;annC.height=vp.height;
  annC.dataset.page=pn;annC.style.cursor='default';
  pw.appendChild(annC);

  const pl=document.createElement('div');
  pl.className='pin-layer';pl.id='pl-'+pn;
  pw.appendChild(pl);

  document.getElementById('pgwrap').appendChild(pw);
  await page.render({canvasContext:pdfC.getContext('2d'),viewport:vp}).promise;

  const ctx=annC.getContext('2d');
  S.pageCanvases[pn]={pdfC,annC,ctx,w:vp.width,h:vp.height};
  redrawPage(pn);
  renderPagePins(pn);
}

// ── TOOLS ──
function setTool(t){
  S.tool=t;
  document.querySelectorAll('.tb[id^="tb-"]').forEach(b=>b.classList.remove('on'));
  document.getElementById('tb-'+t)?.classList.add('on');
  const cursors={pointer:'default',pin:'cell',draw:'crosshair',rect:'crosshair',arrow:'crosshair',text:'text',zarea:'zoom-in'};
  document.querySelectorAll('canvas.al').forEach(c=>c.style.cursor=cursors[t]||'default');
  const hints={pointer:'Click a pin to view its comment',pin:'📍 Click design to add a comment pin',draw:'✏️ Click & drag to draw',rect:'⬜ Click & drag rectangle',arrow:'↗ Click & drag arrow',text:'T Click to add text',zarea:'🔍 Click & drag to zoom into an area — click again to zoom out'};
  document.getElementById('tbhint').textContent=hints[t]||'';
  closePop();
}
document.getElementById('tb-col').addEventListener('input',e=>S.colour=e.target.value);
document.getElementById('tb-rng').addEventListener('input',e=>S.strokeSize=parseInt(e.target.value));

// ── EVENTS ──
function setupEvents(){
  document.querySelectorAll('canvas.al').forEach(c=>{
    const pn=parseInt(c.dataset.page);
    c.addEventListener('mousedown',e=>onDn(e,pn));
    c.addEventListener('mousemove',e=>onMv(e,pn));
    c.addEventListener('mouseup',e=>onUp(e,pn));
    c.addEventListener('click',e=>onClk(e,pn));
    c.addEventListener('touchstart',e=>{e.preventDefault();onDn(tv(e),pn);},{passive:false});
    c.addEventListener('touchmove',e=>{e.preventDefault();onMv(tv(e),pn);},{passive:false});
    c.addEventListener('touchend',e=>{e.preventDefault();onUp(tv(e),pn);},{passive:false});
  });
}
function tv(e){const t=e.touches[0]||e.changedTouches[0];return{clientX:t.clientX,clientY:t.clientY};}
function cpos(e,pn){
  const pc=S.pageCanvases[pn];if(!pc)return null;
  const rect=pc.annC.getBoundingClientRect();
  return{
    x:(e.clientX-rect.left)*(pc.w/rect.width),
    y:(e.clientY-rect.top)*(pc.h/rect.height),
    px:((e.clientX-rect.left)/rect.width)*100,
    py:((e.clientY-rect.top)/rect.height)*100
  };
}
function onDn(e,pn){
  if(S.currentReview?.decision==='approved'||S.tool==='pointer'||S.tool==='pin')return;
  if(S.tool==='zarea'){
    // Start zoom selection
    const pos=cpos(e,pn);if(!pos)return;
    S.isDrawing=true;S.startPos=pos;S.curDrawPage=pn;
    S.zoomSelectActive=true;
    return;
  }
  const pos=cpos(e,pn);if(!pos)return;
  S.isDrawing=true;S.startPos=pos;S.curDrawPage=pn;
  if(S.tool==='draw')S.drawPath=[{x:pos.x,y:pos.y}];
}
function onMv(e,pn){
  if(!S.isDrawing)return;
  const pos=cpos(e,pn);if(!pos)return;
  const ctx=S.pageCanvases[pn]?.ctx;if(!ctx)return;

  if(S.tool==='zarea'&&S.zoomSelectActive){
    // Draw dashed selection rectangle
    redrawPage(pn);
    const s=S.startPos;
    ctx.save();
    ctx.strokeStyle='#3b82f6';ctx.lineWidth=2;
    ctx.setLineDash([6,3]);ctx.globalAlpha=0.9;
    ctx.strokeRect(s.x,s.y,pos.x-s.x,pos.y-s.y);
    ctx.fillStyle='rgba(59,130,246,0.07)';ctx.fillRect(s.x,s.y,pos.x-s.x,pos.y-s.y);
    ctx.restore();
    return;
  }

  ctx.strokeStyle=S.colour;ctx.lineWidth=S.strokeSize;ctx.lineCap='round';ctx.lineJoin='round';
  if(S.tool==='draw'){
    S.drawPath.push({x:pos.x,y:pos.y});
    const p=S.drawPath;
    ctx.globalAlpha=0.85;ctx.beginPath();
    ctx.moveTo(p[p.length-2].x,p[p.length-2].y);ctx.lineTo(pos.x,pos.y);ctx.stroke();ctx.globalAlpha=1;
  }else{
    redrawPage(pn);ctx.globalAlpha=0.85;const s=S.startPos;
    if(S.tool==='rect'){ctx.strokeRect(s.x,s.y,pos.x-s.x,pos.y-s.y);ctx.fillStyle=S.colour;ctx.globalAlpha=0.07;ctx.fillRect(s.x,s.y,pos.x-s.x,pos.y-s.y);}
    else if(S.tool==='arrow')drawArrow(ctx,s.x,s.y,pos.x,pos.y);
    ctx.globalAlpha=1;
  }
}
function onUp(e,pn){
  if(!S.isDrawing)return;
  const pos=cpos(e,pn);if(!pos)return;
  S.isDrawing=false;

  if(S.tool==='zarea'&&S.zoomSelectActive){
    S.zoomSelectActive=false;
    redrawPage(pn);
    const s=S.startPos;
    if(!s)return;
    const selW=Math.abs(pos.x-s.x);
    const selH=Math.abs(pos.y-s.y);
    if(selW<20||selH<20){
      // Too small — toggle zoom out if zoomed, else ignore
      if(S.zoomedIn){zoomOut();}
      return;
    }
    // Apply zoom to selection
    zoomToSelection(pn,s,pos);
    S.startPos=null;
    return;
  }

  if(!S.drawings[pn])S.drawings[pn]=[];
  const s=S.startPos;
  if(S.tool==='draw'&&S.drawPath.length>1)S.drawings[pn].push({type:'draw',path:[...S.drawPath],colour:S.colour,size:S.strokeSize,id:'d'+Date.now()});
  else if(S.tool==='rect'&&s)S.drawings[pn].push({type:'rect',x:s.x,y:s.y,w:pos.x-s.x,h:pos.y-s.y,colour:S.colour,size:S.strokeSize,id:'r'+Date.now()});
  else if(S.tool==='arrow'&&s)S.drawings[pn].push({type:'arrow',x1:s.x,y1:s.y,x2:pos.x,y2:pos.y,colour:S.colour,size:S.strokeSize,id:'a'+Date.now()});
  S.drawPath=[];S.startPos=null;redrawPage(pn);
}

// ── ZOOM TO SELECTION ──
function zoomToSelection(pn,startPos,endPos){
  const pc=S.pageCanvases[pn];if(!pc)return;
  const scroll=document.getElementById('cscroll');
  const pw=document.getElementById('pw-'+pn);if(!pw)return;

  // Calculate selection bounds in canvas coords
  const x1=Math.min(startPos.x,endPos.x);
  const y1=Math.min(startPos.y,endPos.y);
  const selW=Math.abs(endPos.x-startPos.x);
  const selH=Math.abs(endPos.y-startPos.y);

  // Canvas to display ratio
  const canvasRect=pc.annC.getBoundingClientRect();
  const scaleX=canvasRect.width/pc.w;
  const scaleY=canvasRect.height/pc.h;

  // Display coords of selection
  const dispX=x1*scaleX;
  const dispY=y1*scaleY;
  const dispW=selW*scaleX;
  const dispH=selH*scaleY;

  // How much zoom is needed to fill the scroll area
  const scrollW=scroll.clientWidth;
  const scrollH=scroll.clientHeight;
  const zoomFit=Math.min(scrollW/dispW, scrollH/dispH)*0.92;

  // Store current scroll for zoom-out restore
  S.preZoomScroll={left:scroll.scrollLeft,top:scroll.scrollTop};
  S.preZoomTransform=pw.style.transform;
  S.zoomedIn=true;
  S.zoomPn=pn;

  // Apply transform to the page wrap
  const pwRect=pw.getBoundingClientRect();
  const scrollRect=scroll.getBoundingClientRect();
  const originX=dispX+dispW/2;  // centre of selection relative to page
  const originY=dispY+dispH/2;

  pw.style.transformOrigin=originX+'px '+originY+'px';
  pw.style.transform='scale('+zoomFit+')';
  pw.style.transition='transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94)';

  // Scroll so selection is centered
  setTimeout(()=>{
    const newPwRect=pw.getBoundingClientRect();
    const centerX=newPwRect.left+originX*zoomFit - scrollRect.left - scrollW/2;
    const centerY=newPwRect.top+originY*zoomFit - scrollRect.top - scrollH/2;
    scroll.scrollBy({left:centerX,top:centerY,behavior:'smooth'});
  },50);

  // Update zoom label
  document.getElementById('zv').textContent=Math.round(zoomFit*100)+'%';

  // Show zoom-out hint
  const hint=document.getElementById('tbhint');
  if(hint)hint.textContent='🔍 Zoomed in — click 🔍 or press Esc to zoom out';

  // ESC to zoom out
  S._escZoomOut=function(ev){if(ev.key==='Escape')zoomOut();};
  document.addEventListener('keydown',S._escZoomOut);
}

function zoomOut(){
  if(!S.zoomedIn)return;
  const pw=document.getElementById('pw-'+S.zoomPn);
  if(pw){
    pw.style.transition='transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94)';
    pw.style.transform='none';
    pw.style.transformOrigin='';
    setTimeout(()=>{pw.style.transition='';},350);
  }
  // Restore scroll
  if(S.preZoomScroll){
    const scroll=document.getElementById('cscroll');
    setTimeout(()=>scroll.scrollTo({left:S.preZoomScroll.left,top:S.preZoomScroll.top,behavior:'smooth'}),50);
  }
  S.zoomedIn=false;
  document.getElementById('zv').textContent=Math.round(S.zoom*100)+'%';
  const hint=document.getElementById('tbhint');
  if(hint)hint.textContent='🔍 Click & drag to zoom into an area — click again to zoom out';
  if(S._escZoomOut)document.removeEventListener('keydown',S._escZoomOut);
}
function onClk(e,pn){
  if(S.currentReview?.decision==='approved')return;
  const pos=cpos(e,pn);if(!pos)return;
  if(S.tool==='zarea'){
    // Single click while zoomed = zoom out
    if(S.zoomedIn){zoomOut();}
    return;
  }
  if(S.tool==='pin'){closePop();openPop(pos.px,pos.py,pn);}
  else if(S.tool==='text'){const t=prompt('Enter text:');if(t){if(!S.drawings[pn])S.drawings[pn]=[];S.drawings[pn].push({type:'text',x:pos.x,y:pos.y,text:t,colour:S.colour,size:S.strokeSize,id:'t'+Date.now()});redrawPage(pn);}}
}

function drawArrow(ctx,x1,y1,x2,y2){
  const ang=Math.atan2(y2-y1,x2-x1);const hl=Math.max(10,S.strokeSize*4);
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-hl*Math.cos(ang-Math.PI/7),y2-hl*Math.sin(ang-Math.PI/7));ctx.moveTo(x2,y2);ctx.lineTo(x2-hl*Math.cos(ang+Math.PI/7),y2-hl*Math.sin(ang+Math.PI/7));ctx.stroke();
}
function redrawPage(pn){
  const pc=S.pageCanvases[pn];if(!pc)return;
  const ctx=pc.ctx;ctx.clearRect(0,0,pc.w,pc.h);
  (S.drawings[pn]||[]).forEach(d=>{
    ctx.strokeStyle=d.colour;ctx.lineWidth=d.size;ctx.lineCap='round';ctx.lineJoin='round';ctx.globalAlpha=0.85;
    if(d.type==='draw'&&d.path?.length>1){ctx.beginPath();ctx.moveTo(d.path[0].x,d.path[0].y);d.path.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));ctx.stroke();}
    else if(d.type==='rect'){ctx.strokeRect(d.x,d.y,d.w,d.h);ctx.fillStyle=d.colour;ctx.globalAlpha=0.07;ctx.fillRect(d.x,d.y,d.w,d.h);}
    else if(d.type==='arrow')drawArrow(ctx,d.x1,d.y1,d.x2,d.y2);
    else if(d.type==='text'){ctx.globalAlpha=1;ctx.fillStyle=d.colour;ctx.font='bold '+Math.max(12,d.size*4)+'px sans-serif';ctx.fillText(d.text,d.x,d.y);}
    ctx.globalAlpha=1;
  });
}
function undoLast(){const pg=S.curDrawPage||1;if(S.drawings[pg]?.length){S.drawings[pg].pop();redrawPage(pg);}}
function clearPg(){const pg=S.curDrawPage||1;if(!confirm('Clear page '+pg+' drawings?'))return;S.drawings[pg]=[];redrawPage(pg);}

async function doZoom(f){
  if(S.renderMode!=='pdf'||!S.fileData)return;
  S.zoom=Math.max(0.5,Math.min(3,S.zoom*f));
  document.getElementById('zv').textContent=Math.round(S.zoom*100)+'%';
  S.pageCanvases={};
  document.getElementById('ls').style.display='flex';
  setMsg('Re-rendering at '+Math.round(S.zoom*100)+'%...');
  await renderPDF(S.fileData.dataUrl);
  document.getElementById('ls').style.display='none';
}
function resetZoom(){S.zoom=1.6;doZoom(1);}

// ── PINS ──
const dotCols={comment:'#5AB544',change:'#c47d10',error:'#991f1f',ok:'#1456a0'};
const typeIco={comment:'💬',change:'✏️',error:'⚠️',ok:'✓'};
const typeLbl={comment:'Comment',change:'Change Required',error:'Error',ok:'Looks Good'};

function openPop(px,py,pn){
  const pw=document.getElementById('pw-'+pn);if(!pw)return;
  let lx=px+2;if(px>62)lx=px-45;
  let ty=py;if(py>68)ty=py-38;
  const pop=document.createElement('div');
  pop.className='ppop';pop.id='ppop';
  pop.style.left=lx+'%';pop.style.top=ty+'%';
  pop.innerHTML=`<h4>📍 Comment — Page ${pn}</h4>
    <textarea id="ptxt" placeholder="Describe what needs to change..."></textarea>
    <select id="ptype">
      <option value="comment">💬 General Comment</option>
      <option value="change">✏️ Change Required</option>
      <option value="error">⚠️ Error / Mistake</option>
      <option value="ok">✓ This part looks good</option>
    </select>
    <div class="pp-btns">
      <button class="pps" onclick="savePin(${px},${py},${pn})">Save Pin</button>
      <button class="ppc" onclick="closePop()">Cancel</button>
    </div>`;
  pw.appendChild(pop);
  document.getElementById('ptxt').focus();
}
function closePop(){document.getElementById('ppop')?.remove();}
function savePin(px,py,pn){
  const txt=document.getElementById('ptxt')?.value.trim();
  const type=document.getElementById('ptype')?.value||'comment';
  if(!txt){alert('Please enter a comment');return;}
  S.annotations.push({id:'ann_'+Date.now(),type:'pin',pinType:type,num:++S.pinCount,pageNum:pn,x:px,y:py,text:txt,replies:[],reviewer:'Reviewer',createdAt:new Date().toISOString()});
  closePop();renderPagePins(pn);renderAnnList();
  setTimeout(()=>selAnn(S.annotations[S.annotations.length-1].id),80);
}
function renderPagePins(pn){
  const pl=document.getElementById('pl-'+pn);if(!pl)return;
  pl.innerHTML='';
  S.annotations.filter(a=>a.pageNum===pn).forEach(ann=>{
    const pin=document.createElement('div');
    const cc={comment:'pc',change:'pch',error:'pe',ok:'pok'}[ann.pinType]||'pc';
    pin.className='pin '+cc+(S.selectedAnn===ann.id?' sel':'');
    pin.style.left='calc('+ann.x+'% - 8px)';pin.style.top='calc('+ann.y+'% - 22px)';
    pin.title=ann.text;pin.innerHTML='<span class="pn">'+ann.num+'</span>';
    pin.onclick=e=>{e.stopPropagation();selAnn(ann.id);};
    pl.appendChild(pin);
  });
}
function renderAllPins(){for(let i=1;i<=Math.max(S.totalPages,1);i++)renderPagePins(i);}
function selAnn(id){
  S.selectedAnn=id;renderAllPins();showTab('ann');
  setTimeout(()=>{
    const el=document.getElementById('ai-'+id);
    if(el){el.classList.add('sel');el.scrollIntoView({behavior:'smooth',block:'nearest'});}
    document.querySelectorAll('.aitem').forEach(x=>{if(x.id!=='ai-'+id)x.classList.remove('sel');});
  },60);
  const ann=S.annotations.find(a=>a.id===id);
  if(ann?.pageNum&&S.renderMode==='pdf'){scrollToPg(ann.pageNum);S.currentPage=ann.pageNum;updatePlbl();}
}

// ── ANN LIST ──
function renderAnnList(){
  const el=document.getElementById('sb-body');
  let html=`<div class="atip">📍 <b>Pin</b> to comment · ✏️ <b>Draw</b> · ⬜ <b>Rect</b> to highlight · ↗ <b>Arrow</b></div>`;
  if(!S.annotations.length){html+=`<div style="text-align:center;padding:28px 12px;color:var(--subtle);font-size:12px">No annotations yet.<br>Use the tools above to annotate.</div>`;}
  else{
    html+=S.annotations.map(ann=>`
      <div class="aitem${ann.pinType==='error'||ann.pinType==='change'?' tc':''}" id="ai-${ann.id}" onclick="selAnn('${ann.id}')">
        <div class="ahead">
          <div class="adot" style="background:${dotCols[ann.pinType]||dotCols.comment}">${ann.num||'✏'}</div>
          <div><div class="atype">${typeIco[ann.pinType]||'💬'} ${typeLbl[ann.pinType]||'Comment'}</div>${ann.pageNum?`<div class="apg">Page ${ann.pageNum}</div>`:''}</div>
          <div class="atime">${ft(ann.createdAt)}</div>
        </div>
        <div class="atext">${ann.text}</div>
        <div class="awho">${ann.reviewer||'Reviewer'}</div>
        ${ann.replies?.length?`<div class="areplies">${ann.replies.map(r=>`<div class="areply"><div class="areply-who">${r.author} · ${ft(r.createdAt)}</div>${r.text}</div>`).join('')}</div>`:''}
        ${!S.currentReview||S.currentReview.decision!=='approved'?`
          <span class="areplybtn" onclick="event.stopPropagation();togRply('${ann.id}')">↩ Reply</span>
          <div class="rarea" id="ra-${ann.id}">
            <textarea placeholder="Type a reply..."></textarea>
            <div class="rbtns">
              <button style="padding:4px 10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:11px;font-family:var(--font)" onclick="togRply('${ann.id}')">Cancel</button>
              <button style="padding:4px 10px;background:var(--brand);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-family:var(--font);font-weight:600" onclick="saveRply('${ann.id}')">Send</button>
            </div>
          </div>
          <button class="delbtn" onclick="event.stopPropagation();delAnn('${ann.id}')">✕ Remove</button>`:''}
      </div>`).join('');
  }
  el.innerHTML=html;
  if(S.selectedAnn){document.getElementById('ai-'+S.selectedAnn)?.classList.add('sel');}
}
function togRply(id){const el=document.getElementById('ra-'+id);if(!el)return;el.classList.toggle('open');if(el.classList.contains('open'))el.querySelector('textarea')?.focus();}
function saveRply(id){
  const el=document.getElementById('ra-'+id);const txt=el?.querySelector('textarea')?.value.trim();if(!txt)return;
  const ann=S.annotations.find(a=>a.id===id);if(!ann)return;
  if(!ann.replies)ann.replies=[];ann.replies.push({text:txt,author:'Reviewer',createdAt:new Date().toISOString()});
  renderAnnList();
}
function delAnn(id){S.annotations=S.annotations.filter(a=>a.id!==id);if(S.selectedAnn===id)S.selectedAnn=null;renderAllPins();renderAnnList();}

// ── HIST TAB ──
function showHistTab(){
  const el=document.getElementById('sb-body');
  if(!S.allReviews.length){el.innerHTML='<div style="text-align:center;padding:28px;color:var(--subtle);font-size:12px">No previous reviews</div>';return;}
  const dm={approved:{icon:'✅',lbl:'Approved',col:'var(--brand-dark)'},rejected:{icon:'❌',lbl:'Rejected',col:'var(--red)'},revision:{icon:'🔄',lbl:'Revisions Requested',col:'var(--blue)'}};
  el.innerHTML=S.allReviews.map((r,i)=>{
    const d=dm[r.decision]||{icon:'📋',lbl:r.decision,col:'var(--muted)'};
    return `<div style="border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-size:18px">${d.icon}</span>
        <div><div style="font-size:13px;font-weight:700;color:${d.col}">${d.lbl}</div>
          <div style="font-size:10px;color:var(--muted);font-family:var(--mono)">Iteration ${i+1} · ${r.reviewerName} · ${new Date(r.submittedAt).toLocaleDateString('en-ZA')}</div>
        </div>
      </div>
      ${r.reviewerComment?`<div style="font-size:12px;padding:8px;background:var(--bg);border-radius:6px;border-left:3px solid var(--brand-mid);line-height:1.5">"${r.reviewerComment}"</div>`:''}
      ${r.annotations?.length?`<div style="font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:6px">${r.annotations.length} annotation${r.annotations.length!==1?'s':''}</div>`:''}
    </div>`;
  }).join('');
}

// ── INFO TAB ──
function showInfoTab(){
  const job=S.job;
  const fields=[['Project',job.title],['Client',job.client],['Brand',job.brand],['Type',job.projectType],['Design Type',job.designType||job.desType],['Stage',job.status],['Due Date',job.dueDate],['Assigned To',job.assignedTo],['Packaging Type',job.packagingType],['Pack Format',job.packFormat],['Dimensions',job.dimensions],['Substrate',job.substrate],['Print Process',job.printProcess],['Screen Ruling',job.screenRuling],['Colour System',job.colourSystem],['Total Colours',job.totalColours?job.totalColours+' colours':null],['White Required',job.whiteRequired?'Yes':null],['Barcode',job.barcodeRequired],['Target Market',job.targetMarket],['Look & Feel',job.lookAndFeel]].filter(([,v])=>v);
  let html=`<div style="font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--brand-dark);font-family:var(--mono);margin-bottom:9px">SPECIFICATIONS</div>`;
  html+=fields.map(([l,v])=>`<div class="irow"><div class="ilbl">${l}</div><div class="ival">${v}</div></div>`).join('');
  if(job.pantones?.length){html+=`<div class="irow"><div class="ilbl">Pantones</div><div class="ival"><div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:2px">${job.pantones.map(p=>`<span style="display:inline-flex;align-items:center;gap:3px;background:var(--bg);border:1px solid var(--border);padding:2px 7px;border-radius:10px;font-size:9px;font-family:var(--mono)">${p.hex?`<span style="width:9px;height:9px;border-radius:50%;background:${p.hex};border:1px solid rgba(0,0,0,0.12)"></span>`:''}${p.ref}</span>`).join('')}</div></div></div>`;}
  if(job.summary||job.brief){html+=`<div style="margin-top:12px;font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--brand-dark);font-family:var(--mono);margin-bottom:7px">BRIEF</div><div style="font-size:11px;line-height:1.6;padding:9px;background:var(--bg);border-radius:var(--r);border-left:3px solid var(--brand)">${job.summary||job.brief}</div>`;}
  document.getElementById('sb-body').innerHTML=html;
}

function showTab(t){
  document.querySelectorAll('.sbt').forEach(x=>x.classList.remove('on'));
  document.getElementById('sbt-'+t)?.classList.add('on');
  document.getElementById('sb-body').dataset.tab=t;
  if(t==='ann')renderAnnList();
  else if(t==='hist')showHistTab();
  else showInfoTab();
}

// ── DECISION ──
async function doDecision(decision){
  const name=document.getElementById('dec-name')?.value.trim();
  const comment=document.getElementById('dec-cmt')?.value.trim();
  if(!name){document.getElementById('dec-name').style.borderColor='var(--red)';alert('Please enter your name.');return;}
  S.annotations.forEach(a=>{if(a.reviewer==='Reviewer')a.reviewer=name;});
  const review={
    reviewId:'rev_'+S.jobId+'_'+Date.now(),
    jobId:S.jobId,jobRef:S.job.ref,jobTitle:S.job.title,client:S.job.client,
    iteration:S.iteration,decision,reviewerName:name,reviewerComment:comment,
    annotations:S.annotations,submittedAt:new Date().toISOString()
  };
  updatePill(decision);showDecisionDone(review);showSuccess(decision,name);
  try{
    const d=await jget(SHEETS_URL+'?action=read');
    if(!d.approvals)d.approvals=[];
    d.approvals.push(review);
    const ji=(d.jobs||[]).findIndex(j=>j.id===S.jobId);
    if(ji>=0){d.jobs[ji].clientApproval={approved:'Approved',rejected:'Rejected',revision:'Revision Requested'}[decision];d.jobs[ji].lastReviewer=name;d.jobs[ji].reviewIteration=S.iteration;}
    await jpost(SHEETS_URL,d);
    await jget(SHEETS_URL+'?action=sendEmail&jobRef='+encodeURIComponent(review.jobRef||'')+'&jobTitle='+encodeURIComponent(review.jobTitle||'')+'&decision='+encodeURIComponent(decision)+'&reviewer='+encodeURIComponent(name)+'&comment='+encodeURIComponent(comment||'')+'&annotations='+S.annotations.length+'&client='+encodeURIComponent(review.client||'')+'&iteration='+S.iteration);
  }catch(e){console.warn('Save:',e.message);}
}

function updatePill(decision){
  const pill=document.getElementById('hdr-pill');if(!pill)return;
  const m={approved:['pa','✓ Approved'],rejected:['pr','✕ Rejected'],revision:['pv','↩ Revisions']};
  const[c,t]=m[decision]||['pp','Awaiting Review'];
  pill.className='pill '+c;pill.textContent=t;
}
function showDecisionDone(review){
  const panel=document.getElementById('dec-panel');
  const m={approved:{icon:'✅',lbl:'Design Approved',cls:'a',col:'var(--brand-dark)'},rejected:{icon:'❌',lbl:'Rejected',cls:'r',col:'var(--red)'},revision:{icon:'🔄',lbl:'Revisions Requested',cls:'v',col:'var(--blue)'}};
  const s=m[review.decision]||{};
  panel.innerHTML=`<div class="dec-done ${s.cls}">
    <div class="dec-done-icon">${s.icon}</div>
    <div class="dec-done-lbl" style="color:${s.col}">${s.lbl}</div>
    <div class="dec-done-by">${review.reviewerName} · Iteration ${review.iteration} · ${new Date(review.submittedAt).toLocaleDateString('en-ZA')}</div>
    ${review.reviewerComment?`<div style="font-size:11px;margin-top:5px;color:var(--muted)">"${review.reviewerComment}"</div>`:''}
  </div>
  <div style="font-size:10px;text-align:center;color:var(--subtle);font-family:var(--mono);margin-top:7px">Storm43 has been notified.</div>`;
}
function showSuccess(decision,name){
  const m={
    approved:{icon:'🎉',title:'Design Approved!',sub:`Thank you ${name}! Storm43 will proceed with production.`},
    rejected:{icon:'📋',title:'Feedback Submitted',sub:`Thank you ${name}. Your ${S.annotations.length} annotation${S.annotations.length!==1?'s':''} have been sent to Storm43. A revised design will be shared shortly.`},
    revision:{icon:'✏️',title:'Revisions Requested',sub:`Thank you ${name}. Your comments have been sent to the Storm43 studio.`},
  };
  const s=m[decision]||{icon:'✓',title:'Submitted',sub:'Thank you.'};
  document.getElementById('sicon').textContent=s.icon;
  document.getElementById('stitle').textContent=s.title;
  document.getElementById('ssub').textContent=s.sub;
  const ov=document.getElementById('sov');ov.style.display='flex';
  setTimeout(()=>ov.style.display='none',7000);
}
function ft(iso){if(!iso)return'';try{return new Date(iso).toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'});}catch(e){return'';}}

init();
</script>
