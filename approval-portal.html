<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storm43 — Design Approval</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#5AB544;--brand-dark:#3d8a2e;--brand-light:#eaf5e6;--brand-mid:#c8e8c0;
  --dark:#0e0e0d;--dark2:#171715;
  --bg:#f4f3ef;--surface:#fff;--border:#e0dfd9;
  --text:#18180f;--muted:#6b6b60;--subtle:#a8a89a;
  --amber:#c47d10;--amber-bg:#fdf0d6;--amber-border:#f0c96a;
  --red:#991f1f;--red-bg:#fdf0f0;--red-border:#f5b8b8;
  --blue:#1456a0;--blue-bg:#e8f0fc;
  --font:'Inter',system-ui,sans-serif;--mono:'DM Mono',monospace;
  --r:8px;--rl:12px;--rxl:18px;
}
body{font-family:var(--font);background:#1e1e1b;color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}

/* LOADING */
#ls{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:9999;padding:24px;text-align:center}
.lb{width:200px;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.lf{height:100%;background:var(--brand);animation:la 1.6s ease-in-out infinite}
@keyframes la{0%{width:0;margin-left:0}50%{width:60%;margin-left:0}100%{width:0;margin-left:100%}}
.lm{font-size:11px;color:rgba(255,255,255,0.3);font-family:var(--mono);letter-spacing:1px}

/* HEADER */
.hdr{background:var(--dark);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;height:50px}
.hdr img{height:28px}
.hdr-mid{flex:1;padding:0 16px;text-align:center}
.hdr-ref{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--brand);letter-spacing:1px}
.hdr-title{font-size:11px;color:rgba(255,255,255,0.4);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.pill{padding:4px 12px;border-radius:20px;font-size:10px;font-weight:700;font-family:var(--mono)}
.pp{background:#fdf0d6;color:#c47d10;border:1px solid #f0c96a}
.pa{background:var(--brand-light);color:var(--brand-dark);border:1px solid var(--brand-mid)}
.pr{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.pv{background:var(--blue-bg);color:var(--blue);border:1px solid #9ec0f0}

/* LAYOUT */
#app{display:none;flex-direction:column;height:100vh}
.layout{display:flex;flex:1;overflow:hidden}

/* VIEWER */
.viewer{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#2a2a27;min-width:0}
.toolbar{background:#111;padding:7px 14px;display:flex;align-items:center;gap:5px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.06);overflow-x:auto}
.tb{width:32px;height:32px;border-radius:6px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.55);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.15s;flex-shrink:0}
.tb:hover{background:rgba(255,255,255,0.1);color:#fff}
.tb.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.tb-sep{width:1px;height:20px;background:rgba(255,255,255,0.07);margin:0 3px;flex-shrink:0}
.tb-lbl{font-size:9px;color:rgba(255,255,255,0.2);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;flex-shrink:0}
.tb-col{width:28px;height:28px;border-radius:5px;border:2px solid rgba(255,255,255,0.12);cursor:pointer;padding:0;flex-shrink:0}
.tb-rng{width:70px;accent-color:var(--brand);cursor:pointer;flex-shrink:0}
.tb-hint{font-size:10px;color:rgba(255,255,255,0.2);font-family:var(--mono);margin-left:auto;white-space:nowrap}
.pnav{display:flex;align-items:center;gap:5px;flex-shrink:0}
.pnav button{padding:3px 8px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:rgba(255,255,255,0.55);cursor:pointer;font-size:12px;font-family:var(--mono)}
.pnav button:hover{background:rgba(255,255,255,0.12);color:#fff}
.plbl{font-size:10px;color:rgba(255,255,255,0.35);font-family:var(--mono)}

/* CANVAS */
.cscroll{flex:1;overflow:auto;display:flex;flex-direction:column;align-items:center;padding:20px;gap:16px}
.pw{position:relative;flex-shrink:0;box-shadow:0 4px 32px rgba(0,0,0,0.5);border-radius:3px;background:#fff}
.pw canvas{display:block;border-radius:3px}
.al{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:3px}
.pin-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
.pg-placeholder{background:#fff;border-radius:3px;display:flex;align-items:center;justify-content:center;color:#aaa;font-family:var(--mono);font-size:12px;box-shadow:0 4px 32px rgba(0,0,0,0.5);min-width:500px}

/* NO FILE */
.nf{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:420px;gap:14px;color:rgba(255,255,255,0.25);text-align:center;padding:40px}
.nf-icon{font-size:52px;opacity:0.3}
.nf-title{font-size:16px;font-weight:600;color:rgba(255,255,255,0.45)}
.nf-sub{font-size:12px;font-family:var(--mono);opacity:0.6;max-width:380px;line-height:1.8}

/* PIN */
.pin{position:absolute;width:24px;height:24px;border-radius:50% 50% 50% 2px;transform:rotate(-45deg);transform-origin:bottom left;cursor:pointer;display:flex;align-items:center;justify-content:center;pointer-events:all;box-shadow:0 2px 8px rgba(0,0,0,0.5);border:2px solid rgba(255,255,255,0.3);transition:transform 0.15s;z-index:20}
.pin:hover,.pin.sel{transform:rotate(-45deg) scale(1.2);box-shadow:0 0 0 3px rgba(255,255,255,0.25),0 2px 10px rgba(0,0,0,0.5)}
.pn{transform:rotate(45deg);font-size:9px;font-weight:700;color:#fff;font-family:var(--mono)}
.pc{background:#5AB544}.pch{background:#c47d10}.pe{background:#991f1f}.pok{background:#1456a0}

/* PIN POP */
.ppop{position:absolute;z-index:300;background:var(--surface);border:2px solid var(--brand);border-radius:14px;padding:16px;min-width:280px;max-width:340px;box-shadow:0 12px 40px rgba(0,0,0,0.4)}
.ppop h4{font-size:12px;font-weight:700;color:var(--brand-dark);font-family:var(--mono);margin-bottom:10px}
.ppop textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:var(--font);resize:vertical;min-height:110px;outline:none;margin-bottom:10px;background:var(--bg);display:block;line-height:1.5;color:var(--text)}
.ppop textarea:focus{border-color:var(--brand);background:#fff;box-shadow:0 0 0 3px rgba(90,181,68,0.15)}
.ppop select{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);margin-bottom:12px;outline:none;background:#fff;cursor:pointer}
.ppop select:focus{border-color:var(--brand)}
.pp-btns{display:flex;gap:8px}
.pps{flex:1;padding:10px;background:var(--brand);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;font-family:var(--font)}
.pps:hover{background:var(--brand-dark)}
.ppc{padding:10px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;font-family:var(--font);color:var(--muted)}
.ppc:hover{border-color:var(--brand-mid)}

/* SIDEBAR */
.sidebar{width:290px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sbh{padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.sbh-title{font-size:13px;font-weight:600;margin-bottom:2px}
.sbh-sub{font-size:10px;color:var(--muted);font-family:var(--mono)}
.sbtabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.sbt{flex:1;padding:9px;text-align:center;font-size:10px;font-weight:700;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all 0.15s;font-family:var(--mono);letter-spacing:0.5px;text-transform:uppercase}
.sbt.on{color:var(--brand-dark);border-bottom-color:var(--brand);background:var(--brand-light)}
.sb-body{flex:1;overflow-y:auto;padding:12px}
.atip{font-size:11px;color:var(--muted);padding:8px 10px;background:var(--bg);border-radius:6px;margin-bottom:10px;line-height:1.5;border-left:3px solid var(--brand-mid)}
.aitem{border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:7px;cursor:pointer;transition:all 0.15s}
.aitem:hover{border-color:var(--brand-mid);background:#f8fdf5}
.aitem.sel{border-color:var(--brand);background:var(--brand-light)}
.aitem.tc{border-color:var(--red-border);background:var(--red-bg)}
.ahead{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.adot{width:20px;height:20px;border-radius:50%;color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:var(--mono);flex-shrink:0}
.atype{font-size:10px;font-family:var(--mono);color:var(--muted)}
.apg{font-size:9px;font-family:var(--mono);color:var(--subtle)}
.atime{font-size:9px;color:var(--subtle);margin-left:auto;font-family:var(--mono)}
.atext{font-size:12px;line-height:1.45;margin-bottom:3px}
.awho{font-size:10px;color:var(--muted);font-family:var(--mono)}
.areplybtn{font-size:11px;color:var(--blue);cursor:pointer;margin-top:5px;display:inline-block}
.areplies{margin-top:7px;padding-top:7px;border-top:1px solid var(--border)}
.areply{font-size:11px;padding:5px 8px;background:var(--bg);border-radius:4px;margin-bottom:3px;line-height:1.4}
.areply-who{font-family:var(--mono);color:var(--muted);font-size:9px}
.rarea{margin-top:7px;display:none}
.rarea.open{display:block}
.rarea textarea{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--font);resize:none;min-height:55px;outline:none;margin-bottom:5px;background:var(--bg)}
.rarea textarea:focus{border-color:var(--brand);background:#fff}
.rbtns{display:flex;gap:5px;justify-content:flex-end}
.delbtn{font-size:10px;color:var(--subtle);background:none;border:none;cursor:pointer;margin-top:3px;display:block}
.irow{display:flex;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px;gap:8px}
.irow:last-child{border-bottom:none}
.ilbl{color:var(--muted);font-family:var(--mono);font-size:10px;min-width:100px;flex-shrink:0}
.ival{font-weight:500;flex:1}

/* DECISION */
.dec{padding:12px 14px;border-top:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.dec-lbl{font-size:10px;font-weight:700;color:var(--muted);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;margin-bottom:7px}
.dec-inp{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:var(--font);margin-bottom:7px;outline:none;background:var(--bg)}
.dec-inp:focus{border-color:var(--brand);background:#fff}
.dec-cmt{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:var(--r);font-size:12px;font-family:var(--font);resize:none;min-height:55px;outline:none;margin-bottom:9px;background:var(--bg)}
.dec-cmt:focus{border-color:var(--brand);background:#fff}
.dec-btns{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.btn-a{padding:10px;background:var(--brand);color:#fff;border:none;border-radius:var(--r);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font)}
.btn-a:hover{background:var(--brand-dark)}
.btn-r{padding:10px;background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);border-radius:var(--r);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font)}
.btn-r:hover{background:var(--red);color:#fff}
.btn-v{padding:8px;background:var(--blue-bg);color:var(--blue);border:1px solid #9ec0f0;border-radius:var(--r);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font);grid-column:1/-1}
.btn-v:hover{background:var(--blue);color:#fff}
.dec-done{text-align:center;padding:14px;border-radius:var(--rl)}
.dec-done.a{background:var(--brand-light);border:2px solid var(--brand)}
.dec-done.r{background:var(--red-bg);border:2px solid var(--red)}
.dec-done.v{background:var(--blue-bg);border:2px solid var(--blue)}
.dec-done-icon{font-size:26px;margin-bottom:5px}
.dec-done-lbl{font-size:14px;font-weight:700;margin-bottom:2px}
.dec-done-by{font-size:10px;color:var(--muted);font-family:var(--mono)}
.iter-bar{padding:9px 20px;background:var(--amber-bg);border-bottom:1px solid var(--amber-border);font-size:12px;color:var(--amber);font-family:var(--mono);display:none;align-items:center;gap:8px;flex-shrink:0}

/* SUCCESS */
.sov{position:fixed;inset:0;background:rgba(0,0,0,0.72);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px)}
.sbox{background:var(--surface);border-radius:var(--rxl);padding:40px;text-align:center;max-width:360px}
.sicon{font-size:48px;margin-bottom:12px}
.stitle{font-size:20px;font-weight:700;margin-bottom:7px}
.ssub{font-size:13px;color:var(--muted);line-height:1.6}

/* ZOOM CONTROLS */
.zc{position:fixed;bottom:20px;right:305px;display:flex;flex-direction:column;gap:4px;z-index:50}
.zb{width:30px;height:30px;border-radius:6px;background:rgba(0,0,0,0.65);color:rgba(255,255,255,0.65);border:1px solid rgba(255,255,255,0.1);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.zb:hover{background:rgba(0,0,0,0.9);color:#fff}
.zv{font-size:9px;font-family:var(--mono);color:rgba(255,255,255,0.35);text-align:center}

@media(max-width:768px){
  .layout{flex-direction:column}
  .sidebar{width:100%;max-height:44vh;border-left:none;border-top:1px solid var(--border)}
  .zc{right:10px;bottom:48vh}
}
</style>
</head>

    const t=setTimeout(()=>{if(done)return;done=true;cleanup();rej(new Error('Timeout — check Apps Script: Execute as Me, Who can access: Anyone'));},25000);
    window[cb]=d=>{if(done)return;done=true;cleanup();res(d);};
    s.onerror=()=>{if(done)return;done=true;cleanup();rej(new Error('Network error'));};
    function cleanup(){clearTimeout(t);delete window[cb];s.parentNode&&s.parentNode.removeChild(s);}
    s.src=url+(url.includes('?')?'&':'?')+'callback='+cb+'&t='+Date.now();
    document.head.appendChild(s);
  });
}

// Save ONLY the approval record + job status update (not entire DB)
// Avoids URL length limits that silently dropped data before
function jpost(url, data){
  return new Promise(res=>{
    const cb='jp_'+Date.now();
    const s=document.createElement('script');
    let done=false;
    const t=setTimeout(()=>{if(done)return;done=true;cleanup();res({success:true});},20000);
    window[cb]=d=>{if(done)return;done=true;cleanup();res(d);};
    s.onerror=()=>{cleanup();res({success:true});};
    function cleanup(){clearTimeout(t);delete window[cb];s.parentNode&&s.parentNode.removeChild(s);}
    // Only send what changed: approvals array + jobs array (with updated clientApproval)
    // Strip large data to keep URL manageable
    const payload={
      _partialUpdate: true,
      approvals: (data.approvals||[]),
      jobs: (data.jobs||[]).map(j=>({
        id:j.id, ref:j.ref, title:j.title, client:j.client,
        status:j.status, clientApproval:j.clientApproval,
        lastReviewer:j.lastReviewer, lastReviewDate:j.lastReviewDate,
        reviewIteration:j.reviewIteration, sheetsFileStored:j.sheetsFileStored,
        sheetsFileName:j.sheetsFileName, sheetsFileType:j.sheetsFileType
      }))
    };
    const enc=encodeURIComponent(JSON.stringify(payload));
    s.src=url+'?action=write&callback='+cb+'&payload='+enc+'&t='+Date.now();
    document.head.appendChild(s);
  });
}

function getFileFromStorage(jobId){
  try{
    const r=localStorage.getItem('s43_file_'+jobId);
    if(r){const f=JSON.parse(r);if(f&&f.dataUrl&&f.dataUrl.length>100)return f;}
    const bk=localStorage.getItem('storm43_backup');
    if(bk){
      const st=JSON.parse(bk);
      const files=(st.designFiles||[]).filter(f=>f.jobId===jobId&&f.dataUrl&&f.dataUrl.length>100);
      if(files.length)return files.sort((a,b)=>new Date(b.uploadedAt)-new Date(a.uploadedAt))[0];
    }
  }catch(e){}
  return null;
}

// Safe localStorage write — silently skips if quota exceeded (common with large PDFs >5 MB)
function safeLocalSet(key, value){
  try{ localStorage.setItem(key, value); }catch(e){ console.warn('localStorage quota exceeded for key:',key); }
}

async function init(){
  const params=new URLSearchParams(window.location.search);
  S.jobId=params.get('job');
  if(!S.jobId){showErr('Invalid Link','No project ID found in this URL.');return;}
  // Check localStorage FIRST — instant load, no network needed
  try {
    const bk = localStorage.getItem('storm43_backup');
    const lf = getFileFromStorage(S.jobId);
    if (bk) {
      const st = JSON.parse(bk);
      const job = (st.jobs||[]).find(j=>j.id===S.jobId);
      if (job) {
        // Build a data object from localStorage and render immediately
        const localData = {
          jobs: st.jobs||[],
          approvals: st.approvals||[],
          designFiles: st.designFiles||[],
          clients: st.clients||[]
        };
        S.job = job;
        S.allReviews = (st.approvals||[]).filter(r=>r.jobId===S.jobId).sort((a,b)=>new Date(a.submittedAt)-new Date(b.submittedAt));
        const latestLocal = S.allReviews[S.allReviews.length-1];
        S.iteration = S.allReviews.length+1;
        if(latestLocal&&latestLocal.decision==='approved'){
          S.review=latestLocal;S.annotations=latestLocal.annotations||[];S.pinCount=S.annotations.length;S.iteration=S.allReviews.length;
        } else if(latestLocal){
          S.previousAnnotations=latestLocal.annotations||[];S.annotations=[];S.pinCount=0;S.previousReview=latestLocal;
        }
        if(lf&&lf.dataUrl) S.fileData=lf;
        if(!S.fileData){
          const sf=(st.designFiles||[]).filter(f=>f.jobId===S.jobId);
          const pf=sf.find(f=>f.fileType==='pdf'&&f.dataUrl&&f.dataUrl.length>200&&!f.dataUrl.startsWith('['));
          const img=sf.find(f=>f.fileType==='image'&&f.dataUrl&&f.dataUrl.length>200);
          if(pf)S.fileData={dataUrl:pf.dataUrl,fileType:'pdf',name:pf.name};
          else if(img)S.fileData={dataUrl:img.dataUrl,fileType:'image',name:img.name};
        }
        // Always try Sheets if no file found locally — client won't have localStorage
        if(!S.fileData){
          try{
            setMsg('Loading design from server...');
            const resp=await fetch(SHEETS_URL,{method:'POST',redirect:'follow',body:JSON.stringify({action:'getFile',jobId:S.jobId})});
            const fr=await resp.json();
            if(fr&&fr.hasFile&&fr.dataUrl&&fr.dataUrl.length>100)S.fileData={dataUrl:fr.dataUrl,fileType:fr.fileType||'pdf',name:fr.fileName||'Design.pdf'};
          }catch(e){
            try{
              const fr=await jget(SHEETS_URL+'?action=getFile&jobId='+encodeURIComponent(S.jobId));
              if(fr&&fr.hasFile&&fr.dataUrl&&fr.dataUrl.length>100)S.fileData={dataUrl:fr.dataUrl,fileType:fr.fileType||'pdf',name:fr.fileName||'Design.pdf'};
            }catch(e2){console.warn('File fetch (local path):',e2.message);}
          }
        }
        renderApp(localData);
        // Silently refresh approvals from Sheets in background
        setTimeout(async()=>{
          try{
            const fresh=await jget(SHEETS_URL+'?action=read');
            if(fresh&&!fresh.error){
              const fr=(fresh.approvals||[]).filter(r=>r.jobId===S.jobId).sort((a,b)=>new Date(a.submittedAt)-new Date(b.submittedAt));
              if(JSON.stringify(fr)!==JSON.stringify(S.allReviews)){
                S.allReviews=fr;const lat=fr[fr.length-1];S.iteration=fr.length+1;
                if(lat&&lat.decision==='approved'){S.review=lat;S.annotations=lat.annotations||[];S.pinCount=S.annotations.length;S.iteration=fr.length;}
                else if(lat){S.previousAnnotations=lat.annotations||[];S.previousReview=lat;}
                // Only update sidebar/decision — never re-render PDF
                showTab('ann');
                if(S.review){updatePill(S.review.decision);showDecisionDone(S.review);}
              }
            }
          }catch(e){console.warn('Background refresh:',e.message);}
        },800);
        return;
      }
    }
  }catch(localErr){console.warn('localStorage:',localErr.message);}

  // No local data — load from Sheets (first time on this device)
  setMsg('Connecting to studio...');
  try{
    const data=await jget(SHEETS_URL+'?action=read');
    if(!data||data.error)throw new Error(data?.error||'No data returned');
    S.job=(data.jobs||[]).find(j=>j.id===S.jobId);
    if(!S.job){showErr('Project Not Found','Project ID "'+S.jobId+'" not found.');return;}
    S.allReviews=(data.approvals||[]).filter(r=>r.jobId===S.jobId).sort((a,b)=>new Date(a.submittedAt)-new Date(b.submittedAt));
    const latest=S.allReviews[S.allReviews.length-1];
    S.iteration=S.allReviews.length+1;

    if(latest&&latest.decision==='approved'){
      // Approved — lock everything, show final state
      S.review=latest;
      S.annotations=latest.annotations||[];
      S.pinCount=S.annotations.length;
      S.iteration=S.allReviews.length;
    } else if(latest){
      // Rejected or revision requested — new iteration open for review
      // BUT show previous annotations as read-only reference
      S.previousAnnotations=latest.annotations||[]; // stored separately
      S.annotations=[]; // fresh annotations for this iteration
      S.pinCount=0;
      // Also store the previous review for display
      S.previousReview=latest;
    }

    // Load file — always try Sheets first regardless of sheetsFileStored flag
    let fileData=null;
    setMsg('Loading design...');
    try{
      const resp=await fetch(SHEETS_URL,{method:'POST',redirect:'follow',body:JSON.stringify({action:'getFile',jobId:S.jobId})});
      const fr=await resp.json();
      if(fr&&fr.hasFile&&fr.dataUrl&&fr.dataUrl.length>100)fileData={dataUrl:fr.dataUrl,fileType:fr.fileType||'pdf',name:fr.fileName||'Design.pdf'};
    }catch(e){
      // Fallback to JSONP
      try{
        const fr=await jget(SHEETS_URL+'?action=getFile&jobId='+encodeURIComponent(S.jobId));
        if(fr&&fr.hasFile&&fr.dataUrl&&fr.dataUrl.length>100)fileData={dataUrl:fr.dataUrl,fileType:fr.fileType||'pdf',name:fr.fileName||'Design.pdf'};
      }catch(e2){console.warn('File fetch failed:',e2.message);}
    }
    if(!fileData){
      const lf=getFileFromStorage(S.jobId);
      if(lf&&lf.dataUrl)fileData=lf;
    }
    if(!fileData){
      const sf=(data.designFiles||[]).filter(f=>f.jobId===S.jobId);
      const pf=sf.find(f=>f.fileType==='pdf'&&f.dataUrl&&f.dataUrl.length>200&&!f.dataUrl.startsWith('['));
      const img=sf.find(f=>f.fileType==='image'&&f.dataUrl&&f.dataUrl.length>200);
      if(pf)fileData={dataUrl:pf.dataUrl,fileType:'pdf',name:pf.name};
      else if(img)fileData={dataUrl:img.dataUrl,fileType:'image',name:img.name};
    }
    S.fileData=fileData||null;
    renderApp(data);
  }catch(e){showErr('Connection Error',e.message+'<br><br>Ensure Apps Script: Execute as Me · Who can access: Anyone');}
}

async function renderApp(data){
  const job=S.job;
  document.getElementById('hdr-ref').textContent=job.ref;
  document.getElementById('hdr-title').textContent=job.title+(job.client?' · '+job.client:'');
  document.getElementById('sb-title').textContent=job.title;
  document.getElementById('sb-sub').textContent=(job.client||'')+(job.brand?' · '+job.brand:'');
  const latestR=S.allReviews[S.allReviews.length-1];

    const ib=document.getElementById('iter-bar');ib.style.display='flex';

  }
  document.getElementById('ls').style.display='none';
  document.getElementById('app').style.display='flex';

      S.renderMode='pdf';

  }else{renderNoFile();}
  showTab('ann');
  if(S.review){
    updatePill(S.review.decision);
    showDecisionDone(S.review);
  } else if(S.previousReview){
    // Show previous decision as context (not locking the portal)
    updatePill(null);
    // Show a context banner about the previous review
  }
}

// Convert a base64 dataUrl to Uint8Array using fetch+arrayBuffer — native, async, no blocking
async function dataUrlToBytes(dataUrl){
  const resp = await fetch(dataUrl);
  const buf  = await resp.arrayBuffer();
  return new Uint8Array(buf);
}

async function renderPDF(dataUrl){
  try{
    // Decode and cache bytes on first load; subsequent calls (zoom) use cache
    if(!S._pdfBytes && dataUrl){
      setMsg('Decoding PDF…');
      S._pdfBytes = await dataUrlToBytes(dataUrl);
    }
    if(!S._pdfBytes){
      throw new Error('No PDF data available');
    }
    setMsg('Rendering PDF…');
    // Copy bytes each time — PDF.js transfers (consumes) the buffer on use
    const bytesCopy = S._pdfBytes.slice(0);
    S.pdfDoc=await pdfjsLib.getDocument({data:bytesCopy}).promise;
    S.totalPages=S.pdfDoc.numPages;S.currentPage=1;updatePlbl();
    const wrap=document.getElementById('pgwrap');
    wrap.innerHTML='';
    wrap.style.cssText='display:flex;flex-direction:column;align-items:center;gap:16px;padding:8px 4px';
    // Render first page immediately
    await renderPDFPage(1);
    setupEvents();
    // Render remaining pages in background
    if(S.totalPages>1){
      for(let pn=2;pn<=S.totalPages;pn++){
        const ph=document.createElement('div');
        ph.className='pg-placeholder';ph.id='ph-'+pn;
        ph.style.height='800px';ph.textContent='Page '+pn+'...';
        wrap.appendChild(ph);
      }
      (async()=>{
        for(let pn=2;pn<=S.totalPages;pn++){
          await renderPDFPage(pn);
          const ph=document.getElementById('ph-'+pn);if(ph)ph.remove();
          attachPageEvents(pn);
        }
      })();
    }
  }catch(e){
    console.error('PDF:',e);
    document.getElementById('ls').style.display='none';
    document.getElementById('pgwrap').innerHTML=`<div class="nf"><div class="nf-icon">📄</div><div class="nf-title">PDF render failed</div><div class="nf-sub">${e.message}</div></div>`;
  }
}

async function renderPDFPage(pn){
  const page=await S.pdfDoc.getPage(pn);
  const vp=page.getViewport({scale:S.zoom});
  const pw=document.createElement('div');
  pw.className='pw';pw.id='pw-'+pn;pw.dataset.page=pn;
  pw.style.width=vp.width+'px';pw.style.height=vp.height+'px';
  const pdfC=document.createElement('canvas');pdfC.width=vp.width;pdfC.height=vp.height;pw.appendChild(pdfC);
  const annC=document.createElement('canvas');annC.className='al';annC.width=vp.width;annC.height=vp.height;annC.dataset.page=pn;annC.style.cursor='default';pw.appendChild(annC);
  const pl=document.createElement('div');pl.className='pin-layer';pl.id='pl-'+pn;pw.appendChild(pl);
  // Insert before placeholder if exists
  const ph=document.getElementById('ph-'+pn);
  const wrap=document.getElementById('pgwrap');
  if(ph)wrap.insertBefore(pw,ph);else wrap.appendChild(pw);
  await page.render({canvasContext:pdfC.getContext('2d'),viewport:vp}).promise;
  const ctx=annC.getContext('2d');
  S.pageCanvases[pn]={pdfC,annC,ctx,w:vp.width,h:vp.height};
  redrawPage(pn);renderPagePins(pn);
}

function attachPageEvents(pn){
  const pw=document.getElementById('pw-'+pn);if(!pw)return;
  const annC=pw.querySelector('canvas.al');if(!annC)return;
  annC.addEventListener('mousedown',e=>onDn(e,pn));
  annC.addEventListener('mousemove',e=>onMv(e,pn));
  annC.addEventListener('mouseup',e=>onUp(e,pn));
  annC.addEventListener('click',e=>onClk(e,pn));
  annC.addEventListener('touchstart',e=>{e.preventDefault();onDn(tv(e),pn);},{passive:false});
  annC.addEventListener('touchmove',e=>{e.preventDefault();onMv(tv(e),pn);},{passive:false});
  annC.addEventListener('touchend',e=>{e.preventDefault();onUp(tv(e),pn);},{passive:false});
}

function renderImage(dataUrl){
  const wrap=document.getElementById('pgwrap');wrap.innerHTML='';wrap.style.cssText='display:flex;align-items:flex-start;justify-content:center;padding:4px';
  const pw=document.createElement('div');pw.className='pw';pw.id='pw-1';pw.dataset.page='1';
  const img=document.createElement('img');img.src=dataUrl;img.style.cssText='display:block;max-width:900px;width:100%;height:auto';
  img.onload=()=>{
    const w=Math.min(img.naturalWidth,900),h=img.naturalHeight*(w/img.naturalWidth);
    pw.style.width=w+'px';pw.style.height=h+'px';
    const annC=document.createElement('canvas');annC.className='al';annC.width=img.naturalWidth;annC.height=img.naturalHeight;annC.dataset.page='1';annC.style.cursor='default';pw.appendChild(annC);
    const pl=document.createElement('div');pl.className='pin-layer';pl.id='pl-1';pw.appendChild(pl);
    S.pageCanvases[1]={annC,ctx:annC.getContext('2d'),w:img.naturalWidth,h:img.naturalHeight};
    redrawPage(1);renderPagePins(1);setupEvents();
  };
  pw.appendChild(img);wrap.appendChild(pw);
}

function renderNoFile(){
  document.getElementById('pgwrap').innerHTML=`<div class="nf"><div class="nf-icon">📄</div><div class="nf-title">Design not yet shared</div><div class="nf-sub">In the MIS → Project → Design Preview tab → upload PDF → click ↑ Upload for Client Sharing → re-send this link.</div></div>`;
}

function prevPg(){if(S.currentPage>1){S.currentPage--;document.getElementById('pw-'+S.currentPage)?.scrollIntoView({behavior:'smooth',block:'start'});updatePlbl();}}
function nextPg(){if(S.currentPage<S.totalPages){S.currentPage++;document.getElementById('pw-'+S.currentPage)?.scrollIntoView({behavior:'smooth',block:'start'});updatePlbl();}}
function updatePlbl(){document.getElementById('plbl').textContent=S.currentPage+'/'+S.totalPages;}

function setupEvents(){
  document.querySelectorAll('canvas.al').forEach(c=>{
    const pn=parseInt(c.dataset.page);
    c.addEventListener('mousedown',e=>onDn(e,pn));c.addEventListener('mousemove',e=>onMv(e,pn));c.addEventListener('mouseup',e=>onUp(e,pn));c.addEventListener('click',e=>onClk(e,pn));
    c.addEventListener('touchstart',e=>{e.preventDefault();onDn(tv(e),pn);},{passive:false});
    c.addEventListener('touchmove',e=>{e.preventDefault();onMv(tv(e),pn);},{passive:false});
    c.addEventListener('touchend',e=>{e.preventDefault();onUp(tv(e),pn);},{passive:false});
  });
}

function tv(e){const t=e.touches[0]||e.changedTouches[0];return{clientX:t.clientX,clientY:t.clientY};}
function cpos(e,pn){
  const pc=S.pageCanvases[pn];if(!pc)return null;
  const rect=pc.annC.getBoundingClientRect();
  return{x:(e.clientX-rect.left)*(pc.w/rect.width),y:(e.clientY-rect.top)*(pc.h/rect.height),
    px:((e.clientX-rect.left)/rect.width)*100,py:((e.clientY-rect.top)/rect.height)*100};
}

function setTool(t){
  S.tool=t;
  document.querySelectorAll('.tb[id^="tb-"]').forEach(b=>b.classList.remove('on'));
  document.getElementById('tb-'+t)?.classList.add('on');
  const curs={pointer:'default',pin:'cell',draw:'crosshair',rect:'crosshair',arrow:'crosshair'};
  document.querySelectorAll('canvas.al').forEach(c=>c.style.cursor=curs[t]||'default');
  const hints={pointer:'Click a pin to view its comment',pin:'📍 Click design to add a comment pin',draw:'✏️ Click & drag to draw',rect:'⬜ Click & drag rectangle',arrow:'↗ Click & drag arrow'};
  document.getElementById('tbhint').textContent=hints[t]||'';
  closePop();
}
document.getElementById('tb-col').addEventListener('input',e=>S.colour=e.target.value);
document.getElementById('tb-rng').addEventListener('input',e=>S.strokeSize=parseInt(e.target.value));

function onDn(e,pn){
  if(S.review||S.tool==='pointer'||S.tool==='pin')return;
  const pos=cpos(e,pn);if(!pos)return;
  S.isDrawing=true;S.startPos=pos;S.curDrawPage=pn;
  if(S.tool==='draw')S.drawPath=[{x:pos.x,y:pos.y}];
}
function onMv(e,pn){
  if(!S.isDrawing)return;
  const pos=cpos(e,pn);if(!pos)return;
  const ctx=S.pageCanvases[pn]?.ctx;if(!ctx)return;
  ctx.strokeStyle=S.colour;ctx.lineWidth=S.strokeSize;ctx.lineCap='round';ctx.lineJoin='round';
  if(S.tool==='draw'){
    S.drawPath.push({x:pos.x,y:pos.y});const p=S.drawPath;
    ctx.globalAlpha=0.85;ctx.beginPath();ctx.moveTo(p[p.length-2].x,p[p.length-2].y);ctx.lineTo(pos.x,pos.y);ctx.stroke();ctx.globalAlpha=1;
  }else{
    redrawPage(pn);ctx.globalAlpha=0.85;const s=S.startPos;
    if(S.tool==='rect'){ctx.strokeRect(s.x,s.y,pos.x-s.x,pos.y-s.y);ctx.fillStyle=S.colour;ctx.globalAlpha=0.07;ctx.fillRect(s.x,s.y,pos.x-s.x,pos.y-s.y);}
    else if(S.tool==='arrow')drawArrow(ctx,s.x,s.y,pos.x,pos.y);
    ctx.globalAlpha=1;
  }
}
function onUp(e,pn){
  if(!S.isDrawing)return;
  const pos=cpos(e,pn);if(!pos)return;
  S.isDrawing=false;
  if(!S.drawings[pn])S.drawings[pn]=[];
  const s=S.startPos;
  let nd=null;
  if(S.tool==='draw'&&S.drawPath.length>1){nd={type:'draw',path:[...S.drawPath],colour:S.colour,size:S.strokeSize,id:'d'+Date.now()};S.drawings[pn].push(nd);}
  else if(S.tool==='rect'&&s){nd={type:'rect',x:s.x,y:s.y,w:pos.x-s.x,h:pos.y-s.y,colour:S.colour,size:S.strokeSize,id:'r'+Date.now()};S.drawings[pn].push(nd);}
  else if(S.tool==='arrow'&&s){nd={type:'arrow',x1:s.x,y1:s.y,x2:pos.x,y2:pos.y,colour:S.colour,size:S.strokeSize,id:'a'+Date.now()};S.drawings[pn].push(nd);}
  S.drawPath=[];S.startPos=null;redrawPage(pn);
  // Auto popup after drawing
  if(nd&&!S.review){
    const pc=S.pageCanvases[pn];if(!pc)return;
    let px,py;
    if(nd.type==='rect'){px=((nd.x+nd.w/2)/pc.w)*100;py=((nd.y+nd.h/2)/pc.h)*100;}
    else if(nd.type==='arrow'){px=((nd.x1+nd.x2)/2/pc.w)*100;py=((nd.y1+nd.y2)/2/pc.h)*100;}
    else if(nd.type==='draw'){const m=nd.path[Math.floor(nd.path.length/2)];px=(m.x/pc.w)*100;py=(m.y/pc.h)*100;}
    if(px!==undefined)setTimeout(()=>openDrawingPop(px,py,pn,nd.id),80);
  }
}
function onClk(e,pn){
  if(S.review)return;
  const pos=cpos(e,pn);if(!pos)return;
  if(S.tool==='pin'){closePop();openPop(pos.px,pos.py,pn);}
}

function drawArrow(ctx,x1,y1,x2,y2){
  const ang=Math.atan2(y2-y1,x2-x1);const hl=Math.max(10,S.strokeSize*4);
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-hl*Math.cos(ang-Math.PI/7),y2-hl*Math.sin(ang-Math.PI/7));ctx.moveTo(x2,y2);ctx.lineTo(x2-hl*Math.cos(ang+Math.PI/7),y2-hl*Math.sin(ang+Math.PI/7));ctx.stroke();
}
function redrawPage(pn){
  const pc=S.pageCanvases[pn];if(!pc)return;
  const ctx=pc.ctx;ctx.clearRect(0,0,pc.w,pc.h);
  (S.drawings[pn]||[]).forEach(d=>{
    ctx.strokeStyle=d.colour;ctx.lineWidth=d.size;ctx.lineCap='round';ctx.lineJoin='round';ctx.globalAlpha=0.85;
    if(d.type==='draw'&&d.path?.length>1){ctx.beginPath();ctx.moveTo(d.path[0].x,d.path[0].y);d.path.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));ctx.stroke();}
    else if(d.type==='rect'){ctx.strokeRect(d.x,d.y,d.w,d.h);ctx.fillStyle=d.colour;ctx.globalAlpha=0.07;ctx.fillRect(d.x,d.y,d.w,d.h);}
    else if(d.type==='arrow')drawArrow(ctx,d.x1,d.y1,d.x2,d.y2);
    ctx.globalAlpha=1;
  });
}

async function doDecision(decision){
  const name=document.getElementById('dec-name')?.value.trim();
  const comment=document.getElementById('dec-cmt')?.value.trim();
  if(!name){document.getElementById('dec-name').style.borderColor='var(--red)';alert('Please enter your name.');return;}

  S.annotations.forEach(a=>{if(a.reviewer==='Reviewer')a.reviewer=name;});

  const review={
    reviewId:'rev_'+S.jobId+'_'+Date.now(),
    jobId:S.jobId,
    jobRef:S.job.ref||'',
    jobTitle:S.job.title||'',
    client:S.job.client||'',
    iteration:S.iteration,
    decision:decision,
    reviewerName:name,
    reviewerComment:comment||'',
    annotations:S.annotations,
    submittedAt:new Date().toISOString()
  };

  // Show result immediately — do not wait for network
  S.review=review;
  updatePill(decision);
  showDecisionDone(review);
  showSuccess(decision,name);

  // Save and email in background using _partialUpdate — no need to read Sheets first
  try{
    const payload={
      _partialUpdate:true,
      approvals:[review],
      jobs:[{
        id:S.jobId,
        clientApproval:{approved:'Approved',rejected:'Rejected',revision:'Revision Requested'}[decision]||decision,
        lastReviewer:name,
        lastReviewDate:review.submittedAt,
        reviewIteration:S.iteration
      }]
    };

    // Save via fetch POST
    await fetch(SHEETS_URL,{method:'POST',redirect:'follow',body:JSON.stringify(payload)});
    console.log('Review saved to Sheets');

    // Get client email from cached job data
    let clientEmail=S.job.clientEmail||'';
    if(!clientEmail){
      try{
        const bk=localStorage.getItem('storm43_backup');
        if(bk){
          const st=JSON.parse(bk);
          const cr=(st.clients||[]).find(c=>c.name===S.job.client);
          if(cr&&cr.email)clientEmail=cr.email;
        }
      }catch(e){}
    }
    console.log('Client email:',clientEmail||'(studio only)');

    // Send email notification
    await sendEmailNotification({
      jobRef:review.jobRef,
      jobTitle:review.jobTitle,
      decision:decision,
      reviewer:name,
      comment:comment||'',
      annotations:S.annotations.length,
      client:S.job.client||'',
      clientEmail:clientEmail,
      iteration:S.iteration,
      portalUrl:window.location.href
    });
    console.log('Email notification sent');

  }catch(e){
    console.warn('Save/email error:',e.message);
    const hint=document.getElementById('tbhint');
    if(hint)hint.textContent='Could not save — please notify Storm43 directly';
  }
}

// Send email via fetch POST (no URL length limits) with JSONP GET fallback
async function sendEmailNotification(params) {
  // Try fetch POST first
  try {
    await fetch(SHEETS_URL, {
      method: 'POST',
      redirect: 'follow',
      body: JSON.stringify({ action: 'sendEmail', ...params })
    });
    console.log('Email sent via POST');
    return;
  } catch(e) {
    console.warn('POST email failed, trying GET:', e.message);
  }

  // Fallback: JSONP GET
  return new Promise(resolve => {
    const cb = 'email_' + Date.now();
    const s = document.createElement('script');
    let done = false;
    const t = setTimeout(() => { if(done)return; done=true; cleanup(); resolve(); }, 15000);
    window[cb] = d => { if(done)return; done=true; cleanup(); resolve(d); };
    s.onerror = () => { cleanup(); resolve(); };
    function cleanup(){ clearTimeout(t); delete window[cb]; s.parentNode&&s.parentNode.removeChild(s); }
    s.src = SHEETS_URL +
      '?action=sendEmail' +
      '&callback=' + cb +
      '&jobRef='    + encodeURIComponent(params.jobRef) +
      '&jobTitle='  + encodeURIComponent(params.jobTitle) +
      '&decision='  + encodeURIComponent(params.decision) +
      '&reviewer='  + encodeURIComponent(params.reviewer) +
      '&comment='   + encodeURIComponent(params.comment) +
      '&annotations=' + params.annotations +
      '&client='    + encodeURIComponent(params.client) +
      '&clientEmail=' + encodeURIComponent(params.clientEmail) +
      '&iteration=' + params.iteration +
      '&portalUrl=' + encodeURIComponent(params.portalUrl) +
      '&t=' + Date.now();
    document.head.appendChild(s);
  });
}

async function downloadFile(){
  const f=S.fileData;if(!f||!f.dataUrl){alert('No file available.');return;}
  try{
    const resp=await fetch(f.dataUrl);
    const blob=await resp.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=f.name||(S.job?.ref||'Design')+'.pdf';document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),1000);
  }catch(e){window.open(f.dataUrl);}
}

function ft(iso){if(!iso)return'';try{return new Date(iso).toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'});}catch(e){return'';}}

// ── ZOOM ──
async function doZoom(f){
  if(S.renderMode==='image'){
    // Images: instant CSS scale, no re-render
    const pw=document.getElementById('pw-1');
    if(!pw) return;
    S.imgScale=Math.max(0.3,Math.min(4,(S.imgScale||1)*f));
    pw.style.transform='scale('+S.imgScale+')';
    pw.style.transformOrigin='top center';
    document.getElementById('zv').textContent=Math.round(S.imgScale*100)+'%';
    return;
  }
  if(S.renderMode!=='pdf') return;
  if(!S._pdfBytes||!S._pdfBytes.length){
    alert('PDF data not available. Please reload the page.');
    return;
  }
  S.zoom=Math.max(0.5,Math.min(3,S.zoom*f));
  document.getElementById('zv').textContent=Math.round(S.zoom*100)+'%';
  // Save scroll position to restore after re-render
  const scroll=document.getElementById('cscroll');
  const scrollRatio=scroll.scrollTop/(scroll.scrollHeight||1);
  S.pageCanvases={};
  document.getElementById('ls').style.display='flex';
  setMsg('Zooming to '+Math.round(S.zoom*100)+'%...');
  await renderPDF(null); // null = use cached S._pdfBytes
  document.getElementById('ls').style.display='none';
  setupEvents();
  // Restore approximate scroll position
  setTimeout(()=>{
    scroll.scrollTop=scrollRatio*scroll.scrollHeight;
  },100);
}

function resetZoom(){
  if(S.renderMode==='image'){
    const pw=document.getElementById('pw-1');
    if(pw){pw.style.transform='none';pw.style.transformOrigin='top center';}
    S.imgScale=1;
    document.getElementById('zv').textContent='100%';
    return;
  }
  if(Math.round(S.zoom*100)===120) return; // already at default
  S.zoom=1.2;
  doZoom(1); // factor 1 = just re-render at new S.zoom without changing it
}

// ── ANNOTATION REPORT ──
function generateReport(){
  const job = S.job;
  const anns = S.annotations;
  const reviewer = (S.review?.reviewerName)
    || anns.find(a=>a.reviewer&&a.reviewer!=='Reviewer')?.reviewer
    || document.getElementById('dec-name')?.value?.trim()
    || 'Client';
  // Allow report even with no annotations
  if(!anns.length && !S.review) {
    alert('Add some annotations first, then generate the report.');
    return;
  }

  // Capture snapshots of each pin annotation area from the PDF canvas
  const snapshots = {};
  anns.filter(a=>a.type==='pin').forEach(ann=>{
    const pn = ann.pageNum || 1;
    const pc = S.pageCanvases[pn];
    if(!pc) return;
    try {
      // Crop a region around the pin point
      const snapSize = Math.min(pc.w, pc.h) * 0.35; // 35% of page dimension
      const px = (ann.x/100)*pc.w;
      const py = (ann.y/100)*pc.h;
      const x1 = Math.max(0, px - snapSize/2);
      const y1 = Math.max(0, py - snapSize/2);
      const sw = Math.min(snapSize, pc.w - x1);
      const sh = Math.min(snapSize, pc.h - y1);

      // Create snapshot canvas
      const snap = document.createElement('canvas');
      snap.width  = sw;
      snap.height = sh;
      const ctx = snap.getContext('2d');

      // Draw PDF layer
      if(pc.pdfC){
        ctx.drawImage(pc.pdfC, x1, y1, sw, sh, 0, 0, sw, sh);
      }
      // Draw annotation layer
      ctx.drawImage(pc.annC, x1, y1, sw, sh, 0, 0, sw, sh);

      // Draw a circle marker at pin centre
      const cx = px - x1;
      const cy = py - y1;
      const dotCols2 = {comment:'#5AB544',change:'#c47d10',error:'#991f1f',ok:'#1456a0'};
      ctx.beginPath();
      ctx.arc(cx, cy, 14, 0, Math.PI*2);
      ctx.fillStyle = dotCols2[ann.pinType]||'#5AB544';
      ctx.fill();
      ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
      ctx.fillStyle='#fff';
      ctx.font='bold 12px monospace';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(ann.num, cx, cy);

      snapshots[ann.id] = snap.toDataURL('image/jpeg', 0.85);
    } catch(e){ console.warn('Snapshot error:', e); }
  });

  const typeLabels2 = {comment:'Comment',change:'Change Required',error:'Error / Mistake',ok:'Looks Good'};
  const dotCols2   = {comment:'#5AB544',change:'#c47d10',error:'#991f1f',ok:'#1456a0'};
  const decLabel = {approved:'Approved',rejected:'Rejected',revision:'Revisions Requested'}[S.review?.decision]||'Pending';
  const decColour= {approved:'#3d8a2e',rejected:'#991f1f',revision:'#1456a0'}[S.review?.decision]||'#888';
  const now = new Date().toLocaleDateString('en-ZA',{day:'2-digit',month:'long',year:'numeric'});

  const reportHTML = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Annotation Report — ${job.ref}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,Arial,sans-serif;color:#18180f;background:#fff;font-size:13px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
@page{size:A4;margin:12mm}
.header{background:#0e0e0d;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;-webkit-print-color-adjust:exact}
.header-ref{font-family:monospace;font-size:22px;font-weight:700;color:#5AB544;letter-spacing:2px}
.header-date{font-size:11px;color:rgba(255,255,255,0.4);font-family:monospace;text-align:right;margin-top:2px}
.title-band{background:#5AB544;padding:10px 24px;-webkit-print-color-adjust:exact}
.title-band h1{font-size:16px;font-weight:700;color:#fff}
.title-band .sub{font-size:12px;color:rgba(255,255,255,0.85);margin-top:2px}
.meta{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;border:1px solid #e0dfd9;margin:16px 24px 0;border-radius:8px;overflow:hidden}
.meta-item{padding:10px 14px;border-right:1px solid #e0dfd9}
.meta-item:last-child{border-right:none}
.meta-lbl{font-size:9px;font-family:monospace;letter-spacing:1px;color:#6b6b60;text-transform:uppercase;margin-bottom:3px;font-weight:600}
.meta-val{font-size:13px;font-weight:600}
.section-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#3d8a2e;font-family:monospace;padding:14px 24px 6px;border-bottom:2px solid #eaf5e6;margin-top:16px}
.ann-row{display:grid;grid-template-columns:200px 1fr;gap:0;border:1px solid #e0dfd9;border-radius:8px;margin:10px 24px;overflow:hidden;page-break-inside:avoid}
.ann-snap{background:#f4f3ef;display:flex;align-items:center;justify-content:center;min-height:140px;border-right:1px solid #e0dfd9}
.ann-snap img{width:100%;height:100%;object-fit:cover;display:block}
.ann-snap .no-snap{font-size:11px;color:#a8a89a;text-align:center;padding:12px;font-family:monospace}
.ann-body{padding:14px 16px}
.ann-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ann-dot{width:22px;height:22px;border-radius:50%;color:#fff;font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;font-family:monospace;flex-shrink:0}
.ann-type-lbl{font-size:10px;font-family:monospace;color:#6b6b60;letter-spacing:0.3px}
.ann-page{font-size:9px;font-family:monospace;color:#a8a89a;margin-left:auto}
.ann-text{font-size:13px;line-height:1.5;color:#18180f;margin-bottom:6px}
.ann-who{font-size:10px;color:#6b6b60;font-family:monospace}
.reply{background:#f4f3ef;border-left:3px solid #e0dfd9;padding:6px 10px;margin-top:6px;border-radius:0 4px 4px 0;font-size:11px}
.reply-who{font-size:9px;font-family:monospace;color:#6b6b60;margin-bottom:2px}
.no-anns{padding:20px 24px;color:#a8a89a;font-style:italic;text-align:center}
.footer{background:#171715;padding:10px 24px;display:flex;justify-content:space-between;margin-top:20px;-webkit-print-color-adjust:exact}
.footer div{font-size:10px;color:rgba(255,255,255,0.3);font-family:monospace}
.dec-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;font-family:monospace;border:2px solid ${decColour};color:${decColour}}
</style>
</head>
<body>

<div class="header">
  <div>
    <div style="height:28px;margin-bottom:4px">
      <img src="data:image/png;base64,${window._logoB64||''}" style="height:28px" onerror="this.style.display='none'">
      <span style="color:#fff;font-weight:700;font-size:14px;display:${window._logoB64?'none':'inline'}">Storm43</span>
    </div>
    <div style="font-size:11px;color:rgba(255,255,255,0.35);font-family:monospace">Annotation Report</div>
  </div>
  <div style="text-align:right">
    <div class="header-ref">${job.ref}</div>
    <div class="header-date">Generated: ${now}</div>
  </div>
</div>

<div class="title-band">
  <h1>${job.title}</h1>
  <div class="sub">${job.client||''}${job.brand?' · '+job.brand:''}</div>
</div>

<div class="meta">
  <div class="meta-item"><div class="meta-lbl">Reviewer</div><div class="meta-val">${reviewer}</div></div>
  <div class="meta-item"><div class="meta-lbl">Decision</div><div class="meta-val"><span class="dec-badge">${decLabel}</span></div></div>
  <div class="meta-item"><div class="meta-lbl">Annotations</div><div class="meta-val">${anns.length} item${anns.length!==1?'s':''}</div></div>
</div>

${S.review?.reviewerComment?`<div style="margin:12px 24px;padding:10px 14px;background:#f4f3ef;border-left:3px solid #5AB544;border-radius:0 6px 6px 0;font-size:12px;line-height:1.5">${S.review.reviewerComment}</div>`:''}

<div class="section-title">Annotations & Feedback</div>

${anns.length ? anns.map(ann=>`
<div class="ann-row">
  <div class="ann-snap">
    ${snapshots[ann.id]?`<img src="${snapshots[ann.id]}" alt="Annotation ${ann.num}">`
    :`<div class="no-snap">Page ${ann.pageNum||1}<br>Position ${Math.round(ann.x||0)}%, ${Math.round(ann.y||0)}%</div>`}
  </div>
  <div class="ann-body">
    <div class="ann-head">
      <div class="ann-dot" style="background:${dotCols2[ann.pinType]||dotCols2.comment}">${ann.num||'?'}</div>
      <div>
        <div class="ann-type-lbl">${typeLabels2[ann.pinType]||'Comment'}</div>
      </div>
      <div class="ann-page">Page ${ann.pageNum||1}</div>
    </div>
    <div class="ann-text">${ann.text}</div>
    <div class="ann-who">${ann.reviewer||reviewer}</div>
    ${ann.replies&&ann.replies.length?ann.replies.map(r=>`
    <div class="reply"><div class="reply-who">${r.author} replied:</div>${r.text}</div>`).join(''):''}
  </div>
</div>`).join('')
: '<div class="no-anns">No pin annotations recorded.</div>'}

<div class="footer">
  <div>Storm43 Creative Media Agency</div>
  <div>${job.ref} · Annotation Report · ${now}</div>
</div>

</body>
</html>`;

  // Open in new window for printing
  const win = window.open('', '_blank');
  win.document.write(reportHTML);
  win.document.close();
  // Print after images load
  win.addEventListener('load', () => {
    setTimeout(() => {
      win.focus();
      win.print();
    }, 500);
  });
}

init();
</script>
</body>
</html>
